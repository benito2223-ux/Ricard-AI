// ─── Dashboard ────────────────────────────────────────────────
function Dashboard() {
  const { state, dispatch } = useApp();
  const isMobile = useIsMobile();
  if (!state.showDashboard) return null;

  const costs = PROFILES.map(p => ({ ...p, spent: loadMonthCost(p.id), budget: state.settings.budgets?.[p.id] || 50 }));
  const totalSpent = costs.reduce((a, p) => a + p.spent, 0);
  const log = loadCostLog().slice(0, 25);

  // Weekly digest
  const now = Date.now();
  const weekAgo = now - 7 * 24 * 3600 * 1000;
  const fullLog = loadCostLog();
  const weekLog = fullLog.filter(e => e.ts >= weekAgo);
  const weekByProfile = PROFILES.map(p => {
    const entries = weekLog.filter(e => e.profile === p.id);
    const msgs = entries.length;
    const cost = entries.reduce((a, e) => a + (e.cost || 0), 0);
    return { ...p, msgs, cost };
  });
  const mostActive = weekByProfile.reduce((best, p) => p.msgs > best.msgs ? p : best, { msgs: -1, name:'—' });
  const ts = state.tabs[state.tab];
  const conv = ts?.convs.find(c => c.id === ts.activeId);

  return (
    <>
      <div onClick={() => dispatch({ type:'TOGGLE_DASHBOARD' })} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.3)', zIndex:100 }} />
      <div style={{ position:'fixed', top:'4%', left:'50%', transform:'translateX(-50%)', width: isMobile ? 'calc(100vw - 16px)' : 700, maxHeight: isMobile ? 'calc(92dvh - 56px - env(safe-area-inset-bottom, 0px))' : '90vh', background:'white', border:`2px solid ${C.ink}`, borderRadius:14, boxShadow:'6px 8px 0 rgba(0,0,0,.15)', zIndex:101, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <div style={{ padding:'14px 20px', borderBottom:`1.5px solid #e8e5dc`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:17, fontWeight:700 }}>📊 Tokens & Coûts</span>
          <button onClick={() => dispatch({ type:'TOGGLE_DASHBOARD' })} style={{ background:'none', border:'none', cursor:'pointer', fontSize:20, color:'#888' }}>✕</button>
        </div>
        <div style={{ overflow:'auto', padding:20, display:'flex', flexDirection:'column', gap:16 }}>
          {conv && conv.totalCost > 0 && (
            <div style={{ background:C.ink, borderRadius:12, padding:'16px 20px', display:'flex', alignItems:'center', gap:20 }}>
              <div>
                <div style={{ fontSize:10, color:'rgba(255,255,255,.5)', letterSpacing:1.5, textTransform:'uppercase', marginBottom:4 }}>Conversation actuelle</div>
                <div style={{ fontSize:36, fontFamily:'monospace', fontWeight:700, color:C.yellow }}>${conv.totalCost.toFixed(5)}</div>
                <div style={{ fontSize:12, color:'rgba(255,255,255,.5)', marginTop:2 }}>
                  {((conv.totalIn+conv.totalOut)/1000).toFixed(1)}k tokens · {getModel(conv.model)?.name}
                </div>
              </div>
              {state.streaming && <span className="streaming-dot" style={{ marginLeft:'auto', flexShrink:0, width:10, height:10 }} />}
            </div>
          )}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }}>
            {[
              { label:'Dépensé ce mois', value:`$${totalSpent.toFixed(2)}`, sub:`sur $${costs.reduce((a,p)=>a+p.budget,0)} budget` },
              { label:'Conversations', value: Object.values(state.tabs).reduce((a,t)=>a+(t?.convs?.length||0),0), sub:'tous profils' },
              { label:'Modèle actif', value: getModel(conv?.model)?.name || '—', sub:'' },
            ].map(s => (
              <div key={s.label} style={{ border:`1.5px solid #e8e5dc`, borderRadius:10, padding:'12px 14px' }}>
                <div style={{ fontSize:11, color:'#aaa' }}>{s.label}</div>
                <div style={{ fontSize:20, fontWeight:700, margin:'4px 0 2px' }}>{s.value}</div>
                <div style={{ fontSize:11, color:'#bbb' }}>{s.sub}</div>
              </div>
            ))}
          </div>
          <div>
            <div style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, color:'#888', marginBottom:10 }}>Par profil · ce mois</div>
            {costs.map(p => {
              const pct = Math.min(100, (p.spent/p.budget)*100);
              return (
                <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12, marginBottom:8 }}>
                  <div style={{ width:28, height:28, borderRadius:'50%', background:p.color, border:`1.5px solid ${C.ink}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontFamily:"'Permanent Marker',cursive", fontWeight:700, flexShrink:0 }}>{p.label}</div>
                  <span style={{ width:60, fontSize:13, fontWeight:500 }}>{p.name}</span>
                  <div style={{ flex:1, height:8, background:'#f1eee5', borderRadius:999, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:`${pct}%`, background: pct>80 ? C.red : p.color, borderRadius:999 }} />
                  </div>
                  <span style={{ fontSize:12, fontWeight:600, minWidth:60, textAlign:'right' }}>${p.spent.toFixed(2)} <span style={{ color:'#bbb', fontWeight:400 }}>/ ${p.budget}</span></span>
                </div>
              );
            })}
          </div>
          {/* Weekly digest */}
          <div>
            <div style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, color:'#888', marginBottom:10 }}>📅 Cette semaine</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:10, marginBottom:10 }}>
              {weekByProfile.map(p => (
                <div key={p.id} style={{ border:`1.5px solid #e8e5dc`, borderRadius:10, padding:'10px 12px', display:'flex', alignItems:'center', gap:10 }}>
                  <div style={{ width:28, height:28, borderRadius:'50%', background:p.color, border:`1.5px solid ${C.ink}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontFamily:"'Permanent Marker',cursive", fontWeight:700, flexShrink:0 }}>{p.label}</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600 }}>{p.name}</div>
                    <div style={{ fontSize:11, color:'#aaa' }}>{p.msgs} msg · ${p.cost.toFixed(3)}</div>
                  </div>
                </div>
              ))}
            </div>
            {mostActive.msgs > 0 && (
              <div style={{ fontSize:13, color:'#555', background:'#f7f4ec', padding:'8px 12px', borderRadius:8 }}>
                🏆 Plus actif cette semaine : <strong>{mostActive.name}</strong> ({mostActive.msgs} messages)
              </div>
            )}
          </div>

          {log.length > 0 && (
            <div>
              <div style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, color:'#888', marginBottom:10 }}>Journal des échanges</div>
              <div style={{ border:`1px solid #e8e5dc`, borderRadius:8, overflow:'hidden', fontFamily:'monospace', fontSize:12 }}>
                {log.map((e, i) => (
                  <div key={i} style={{ display:'grid', gridTemplateColumns:'80px 60px 130px 1fr 70px', padding:'6px 12px', borderBottom: i<log.length-1 ? `1px solid #f0ede4` : 'none', background: i%2===0 ? 'white' : '#fafaf6', alignItems:'center', gap:4 }}>
                    <span style={{ color:'#aaa' }}>{new Date(e.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
                    <span style={{ textTransform:'capitalize' }}>{e.profile}</span>
                    <span style={{ color:C.blue }}>{getModel(e.model)?.name || e.model.split('/')[1]}</span>
                    <span style={{ color:'#aaa' }}>↑{e.inputTokens} ↓{e.outputTokens}</span>
                    <span style={{ textAlign:'right', fontWeight:700 }}>${e.cost.toFixed(5)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ─── Artifact Panel ───────────────────────────────────────────
function ArtifactPanel() {
  const { state, dispatch } = useApp();
  const [view, setView] = useState('preview'); // 'preview' | 'code'
  const { artifact, showArtifact } = state;

  if (!showArtifact || !artifact) return null;

  const l = (artifact.lang || '').toLowerCase();
  const isRenderable = RENDERABLE.includes(l);
  const srcDoc = l === 'svg'
    ? `<!DOCTYPE html><html><body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f8f8">${artifact.content}</body></html>`
    : artifact.content;

  const download = () => {
    const mime = DOWNLOADABLE_LANGS[l] || 'text/plain';
    const blob = new Blob([artifact.content], { type: mime });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `ricard-design.${l}`; a.click(); URL.revokeObjectURL(a.href);
  };

  return (
    <div style={{ width:480, minWidth:380, maxWidth:'45vw', borderLeft:`1.5px solid ${C.ink}`, display:'flex', flexDirection:'column', background:'white', flexShrink:0 }}>
      {/* Header */}
      <div style={{ padding:'8px 14px', borderBottom:`1px solid #e8e5dc`, display:'flex', alignItems:'center', gap:8, background:'#f7f4ec', flexShrink:0 }}>
        <span style={{ fontSize:12, color:'#888', fontFamily:'monospace', flex:1 }}>
          {l.toUpperCase()} · Artifact
        </span>
        {isRenderable && (
          <div style={{ display:'flex', border:`1px solid #e0ddd4`, borderRadius:6, overflow:'hidden' }}>
            {['preview','code'].map(v => (
              <button key={v} onClick={() => setView(v)}
                style={{ padding:'3px 10px', background: view===v ? C.ink : 'transparent', color: view===v ? 'white' : '#888', border:'none', cursor:'pointer', fontSize:11 }}>
                {v === 'preview' ? '👁 Aperçu' : '</> Code'}
              </button>
            ))}
          </div>
        )}
        <button onClick={download}
          style={{ background:'none', border:`1px solid #e0ddd4`, borderRadius:6, padding:'3px 10px', fontSize:11, cursor:'pointer', color:'#555' }}>
          ⬇ .{l}
        </button>
        <button onClick={() => dispatch({ type:'CLOSE_ARTIFACT' })}
          style={{ background:'none', border:'none', cursor:'pointer', fontSize:18, color:'#aaa', lineHeight:1, padding:'0 2px' }}>×</button>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        {isRenderable && view === 'preview' ? (
          <iframe srcDoc={srcDoc} sandbox="allow-scripts allow-same-origin"
            style={{ flex:1, border:'none', width:'100%' }} />
        ) : (
          <pre style={{ margin:0, padding:'16px', overflow:'auto', flex:1, fontSize:13, lineHeight:1.6, background:'#1e1e2e', color:'#e8e5dc' }}>
            <code ref={el => {
              if (el && window.Prism) {
                el.textContent = artifact.content;
                el.className = `language-${PRISM_LANG[l] || l}`;
                window.Prism.highlightElement(el);
              }
            }} className={`language-${PRISM_LANG[l] || l}`}>{artifact.content}</code>
          </pre>
        )}
      </div>
    </div>
  );
}

// ─── Mobile Nav ───────────────────────────────────────────────
function MobileNav() {
  const { state, dispatch } = useApp();
  return (
    <nav className="mobile-nav">
      {TAB_DEFS.map(t => {
        const active = state.tab === t.id;
        return (
          <button key={t.id} className="mobile-nav-btn"
            onClick={() => dispatch({ type:'SET_TAB', payload:t.id })}
            style={{ color: active ? (t.color || C.ink) : C.muted, fontWeight: active ? 700 : 400 }}>
            <span>{t.icon}</span>
            <span>{t.label}</span>
            {active && <div style={{ width:20, height:2, background: t.color || C.ink, borderRadius:999, marginTop:1 }} />}
          </button>
        );
      })}
    </nav>
  );
}

// ─── Layout ───────────────────────────────────────────────────
function Layout() {
  const { state } = useApp();
  const isMobile = useIsMobile();
  const [collapsed, setCollapsed] = useState(false);
  const [darkMode, setDarkMode] = useState(() => !!localStorage.getItem('ricard_dark'));
  const TAB_MAP = { chat:<ChatTab/>, code:<CodeTab/>, design:<DesignTab/>, zya:<ZyaTab/>, zelie:<ZelieTab/>, famille:<FamilyTab/> };

  // Apply dark mode class on mount and toggle
  useEffect(() => {
    if (darkMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
    localStorage.setItem('ricard_dark', darkMode ? '1' : '');
  }, [darkMode]);

  const toggleDark = () => setDarkMode(v => !v);

  return (
    <div style={{ height:'100dvh', display:'flex', flexDirection:'column', overflow:'hidden', background:C.paper }}>
      {/* Title bar — hidden on mobile */}
      {!isMobile && (
        <div style={{ height:28, background:'#eae6dc', borderBottom:`1px solid #d8d4ca`, display:'flex', alignItems:'center', padding:'0 14px', gap:10, flexShrink:0 }}>
          <div style={{ display:'flex', gap:5 }}>
            {[C.red, C.yellow, C.green].map(col => <div key={col} style={{ width:11, height:11, borderRadius:'50%', background:col, border:'1px solid rgba(0,0,0,.15)' }} />)}
          </div>
          <span style={{ fontSize:13, color:C.ink, fontFamily:'var(--pc-font-display)', flex:1, textShadow:`1px 1px 0 ${C.orange}` }}>Ricard AI</span>
          <button onClick={toggleDark} title={darkMode ? 'Mode clair' : 'Mode sombre'}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:'#999', padding:'0 4px' }}
            onMouseEnter={e => e.currentTarget.style.color = C.ink}
            onMouseLeave={e => e.currentTarget.style.color = '#999'}>
            {darkMode ? '☀️' : '🌙'}
          </button>
          <button
            title="Télécharger l'application"
            onClick={() => {
              const html = document.documentElement.outerHTML;
              const blob = new Blob([html], { type: 'text/html' });
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = 'Ricard AI.html';
              a.click();
              URL.revokeObjectURL(a.href);
            }}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, color:'#999', padding:'0 4px', display:'flex', alignItems:'center', gap:3 }}
            onMouseEnter={e => e.currentTarget.style.color = C.ink}
            onMouseLeave={e => e.currentTarget.style.color = '#999'}
          >
            ⬇ télécharger
          </button>
        </div>
      )}
      <div style={{ flex:1, display:'flex', minHeight:0, paddingBottom: isMobile ? 'calc(56px + env(safe-area-inset-bottom, 0px))' : 0 }}>
        {!isMobile && <Sidebar collapsed={collapsed} onToggle={() => setCollapsed(v => !v)} />}
        <main style={{ flex:1, display:'flex', minWidth:0, minHeight:0, overflow:'hidden' }}>
          <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, minHeight:0, overflow:'hidden' }}>
            {TAB_MAP[state.tab] || <ChatTab/>}
          </div>
          {!isMobile && <ArtifactPanel />}
        </main>
      </div>
      {isMobile && <MobileNav />}
      <ModelPicker />
      <Settings />
      <Dashboard />
      <SearchModal />
      <CompareModal />
    </div>
  );
}

// ─── Error Boundary ──────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { crashed: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { crashed: true, error };
  }
  componentDidCatch(error, info) {
    console.error('[Ricard AI] Crash React :', error, info);
  }
  render() {
    if (!this.state.crashed) return this.props.children;
    const err = this.state.error;
    return (
      <div style={{
        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        height:'100dvh', padding:32, fontFamily:'Inter,system-ui,sans-serif',
        background:'#fbfaf6', color:'#1a1a1a', textAlign:'center', gap:16
      }}>
        <div style={{ fontSize:48 }}>😵</div>
        <div style={{ fontSize:20, fontWeight:700 }}>Oups, quelque chose a planté !</div>
        <div style={{
          fontSize:13, color:'#888', maxWidth:420, background:'#f1eee5',
          borderRadius:10, padding:'12px 16px', fontFamily:'monospace',
          wordBreak:'break-word', textAlign:'left'
        }}>
          {err?.message || String(err)}
        </div>
        <button
          onClick={() => { this.setState({ crashed:false, error:null }); }}
          style={{
            marginTop:8, padding:'10px 24px', borderRadius:8, border:'2px solid #1a1a1a',
            background:'#1a1a1a', color:'white', fontSize:15, fontWeight:600,
            cursor:'pointer', fontFamily:'inherit'
          }}
        >
          🔄 Réessayer
        </button>
        <button
          onClick={() => { localStorage.clear(); window.location.reload(); }}
          style={{
            padding:'8px 20px', borderRadius:8, border:'1.5px solid #ccc',
            background:'transparent', color:'#888', fontSize:13,
            cursor:'pointer', fontFamily:'inherit'
          }}
        >
          Réinitialiser l'app
        </button>
      </div>
    );
  }
}

// ─── Root ─────────────────────────────────────────────────────
function App() {
  const { state } = useApp();
  // Portail famille en premier — bloque tout le reste
  if (state.showFamilyGate) return <FamilyGate />;
  return (
    <>
      {state.profile ? <Layout /> : <ProfileSelector />}
      <PinEntry />
      <WelcomeOverlay />
      <ToastContainer />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ErrorBoundary>
    <AppProvider>
      <App />
    </AppProvider>
  </ErrorBoundary>
);
</script>

<script>
// ── Service Worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] registered', reg.scope))
      .catch(err => console.warn('[SW] registration failed:', err));

    // Pattern canonique : recharge une seule fois quand le nouveau SW prend le contrôle.
    // Fonctionne grâce au skipWaiting() dans sw.js qui active le nouveau SW immédiatement.
    // Le flag local 'reloading' empêche toute boucle (reset à chaque chargement de page).
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloading) return;
      reloading = true;
      window.location.reload();
    });
  });
}
</script>

              disabled={!customId.trim() || !customId.includes('/')}
              onClick={() => { if (customId.trim().includes('/')) { onSelect(customId.trim()); onClose(); } }}
              style={{ background: customId.includes('/') ? '#7c3aed' : C.faint, border:'none', borderRadius:8, color:'white', padding:'6px 14px', fontSize:13, cursor: customId.includes('/') ? 'pointer' : 'not-allowed', fontWeight:700, fontFamily:'var(--pc-font-display)' }}>
              OK
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

// ─── Image Message Content ────────────────────────────────────
function ImageMsgContent({ msg }) {
  const isMobile = useIsMobile();
  const [imgLoaded, setImgLoaded] = useState(false);
  const [copied, setCopied] = useState(false);

  const handleDownload = () => {
    const a = document.createElement('a');
    a.href = msg.imageUrl;
    a.download = `ricard-image-${Date.now()}.png`;
    a.target = '_blank';
    a.rel = 'noopener';
    a.click();
  };
  const handleCopyUrl = () => {
    navigator.clipboard.writeText(msg.imageUrl).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  };

  return (
    <div>
      {/* Prompt affiché */}
      <div style={{ fontSize:12, color:'#888', marginBottom:10, fontStyle:'italic', lineHeight:1.4 }}>
        🎨 <em>"{msg.imagePrompt}"</em>
      </div>
      {/* Image ou spinner */}
      {msg.imageUrl ? (
        <div>
          <div style={{ position:'relative', display:'inline-block', width:'100%' }}>
            {!imgLoaded && (
              <div style={{ width:'100%', height:200, background:'#f1eee5', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center', border:`3px solid ${C.ink}` }}>
                <span className="streaming-dot" style={{ width:10, height:10 }} />
              </div>
            )}
            <img
              src={msg.imageUrl} alt={msg.imagePrompt}
              onLoad={() => setImgLoaded(true)}
              style={{ display: imgLoaded ? 'block' : 'none', maxWidth:'100%', width:'100%', borderRadius:8, border:`3px solid ${C.ink}`, boxShadow:`4px 4px 0 ${C.ink}` }}
            />
          </div>
          {/* Prompt révisé si disponible */}
          {msg.revisedPrompt && msg.revisedPrompt !== msg.imagePrompt && (
            <div style={{ fontSize:11, color:'#bbb', marginTop:6, fontStyle:'italic', lineHeight:1.35 }}>
              ✏️ Prompt révisé : {msg.revisedPrompt}
            </div>
          )}
          {/* Boutons actions */}
          <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
            <button onClick={handleDownload}
              style={{ background:C.yellow, border:`2px solid ${C.ink}`, borderRadius:'var(--pc-radius-3)', padding:'4px 12px', fontSize:12, cursor:'pointer', fontWeight:700, boxShadow:`2px 2px 0 ${C.ink}`, fontFamily:'var(--pc-font-display)', color:C.ink }}>
              ⬇ Télécharger
            </button>
            <button onClick={handleCopyUrl}
              style={{ background:copied?'#e8f5e9':'#f1eee5', border:`2px solid ${copied?C.green:C.faint}`, borderRadius:'var(--pc-radius-3)', padding:'4px 12px', fontSize:12, cursor:'pointer', fontWeight:700, color: copied ? C.green : '#555', transition:'all .2s' }}>
              {copied ? '✅ Copié !' : '🔗 Copier l\'URL'}
            </button>
            <a href={msg.imageUrl} target="_blank" rel="noopener"
              style={{ background:'#f1eee5', border:`2px solid ${C.faint}`, borderRadius:'var(--pc-radius-3)', padding:'4px 12px', fontSize:12, cursor:'pointer', color:'#555', textDecoration:'none', fontFamily:'var(--pc-font-body)', display:'inline-flex', alignItems:'center' }}>
              🔍 Ouvrir
            </a>
          </div>
        </div>
      ) : (
        /* En cours de génération */
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'20px 0' }}>
          <span className="streaming-dot" style={{ width:8, height:8 }} />
          <span style={{ fontSize:13, color:'#888' }}>Génération en cours… (peut prendre 10-30 secondes)</span>
        </div>
      )}
    </div>
  );
}

// ─── Chat Thread ──────────────────────────────────────────────
function ChatThread({ tabId }) {
  const { state, dispatch, sendMessage } = useApp();
  const isMobile = useIsMobile();
  const [hoveredId, setHoveredId] = useState(null);
  const [speakingId, setSpeakingId] = useState(null);
  const ref = useRef(null);

  const handleSpeak = useCallback((msg) => {
    if (speakingId === msg.id) {
      stopSpeech();
      setSpeakingId(null);
    } else {
      stopSpeech();
      setSpeakingId(msg.id);
      textToSpeech(msg.content, () => setSpeakingId(null));
    }
  }, [speakingId]);

  // Stop speech when tab changes or messages update heavily
  useEffect(() => () => stopSpeech(), [tabId]);
  const t = state.tabs[tabId];
  const conv = t?.convs.find(c => c.id === t.activeId);
  const messages = conv?.messages || [];

  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [messages]);

  const openArtifact = useCallback((artifact) => dispatch({ type:'OPEN_ARTIFACT', payload: artifact }), [dispatch]);

  const handleEdit = (msg) => {
    dispatch({ type:'EDIT_MESSAGE', payload:{ tabId, msgId: msg.id } });
    window.dispatchEvent(new CustomEvent('ricard-edit', { detail:{ tabId, content: msg.content } }));
  };

  const handleRegenerate = () => {
    if (state.streaming) return;
    const lastUser = [...messages].reverse().find(m => m.role === 'user');
    if (!lastUser) return;
    dispatch({ type:'REGENERATE', payload:{ tabId } });
    setTimeout(() => sendMessage({ tabId, content: lastUser.content, attachments: lastUser.attachments || [] }), 50);
  };

  const exportMd = () => {
    const lines = [`# ${conv?.title || 'Conversation'}\n`];
    messages.forEach(m => lines.push(`\n**${m.role === 'user' ? 'Vous' : 'Ricard AI'}**\n\n${m.content}\n`));
    const blob = new Blob([lines.join('\n')], { type:'text/markdown' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `${(conv?.title || 'conv').slice(0,40)}.md`; a.click(); URL.revokeObjectURL(a.href);
  };

  if (!messages.length) return null;

  return (
    <div ref={ref} className="scroll-y" style={{ flex:1, minHeight:0, padding: isMobile ? '12px 10px' : '20px 24px', display:'flex', flexDirection:'column', gap:12 }}>
      {messages.map((msg, idx) => {
        const isLastDone = idx === messages.length - 1 && msg.role === 'assistant' && msg.done;
        return (
          <div key={msg.id}
            onMouseEnter={() => setHoveredId(msg.id)}
            onMouseLeave={() => setHoveredId(null)}
            style={{ display:'flex', justifyContent: msg.role==='user' ? 'flex-end' : 'flex-start', gap:10, alignItems:'flex-start' }}>
            {msg.role === 'assistant' && (
              <div style={{ width:32, height:32, borderRadius:'50%', background:C.blue, border:`3px solid ${C.ink}`, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, color:C.ink, fontFamily:'var(--pc-font-display)', boxShadow:`2px 2px 0 ${C.ink}`, marginTop:2 }}>R</div>
            )}
            <div style={{ maxWidth: msg.type === 'image' ? (isMobile ? '95%' : '80%') : (isMobile ? '88%' : '72%') }}>
              <div style={{ background: msg.role==='user' ? C.yellow : 'white', border:`3px solid ${C.ink}`, borderRadius: msg.role==='user' ? 'var(--pc-radius-1)' : 'var(--pc-radius-2)', padding: isMobile ? '13px 17px' : '12px 16px', fontSize: isMobile ? 17 : 16, lineHeight:1.65, boxShadow:`4px 4px 0 ${C.ink}` }}>
                {msg.type === 'image' ? (
                  <ImageMsgContent msg={msg} />
                ) : msg.role === 'user' ? (
                  <div>
                    {msg.attachments?.length > 0 && (
                      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom: msg.content ? 8 : 0 }}>
                        {msg.attachments.map(att => att.type === 'image' ? (
                          <img key={att.id} src={att.preview} alt={att.name}
                            style={{ maxWidth: isMobile ? 160 : 220, maxHeight:160, borderRadius:8, objectFit:'cover', border:`1px solid rgba(0,0,0,.1)`, display:'block' }} />
                        ) : (
                          <div key={att.id} style={{ background:'rgba(255,255,255,.6)', border:`1px solid rgba(0,0,0,.12)`, borderRadius:8, padding:'6px 10px', fontSize:12, display:'flex', alignItems:'center', gap:6 }}>
                            <span style={{ fontSize:18 }}>📄</span>
                            <span style={{ maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{att.name}</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {msg.content && <div style={{ whiteSpace:'pre-wrap' }}>{msg.content}</div>}
                  </div>
                ) : <MsgContent content={msg.content} onOpenArtifact={openArtifact} />}
              </div>
              <div style={{ display:'flex', gap:6, marginTop:5, fontSize:12, color:'#aaa', paddingLeft:4, alignItems:'center', minHeight:20 }}>
                {msg.role === 'assistant' && msg.done && (msg.inTk || msg.outTk) && (
                  <><span>{((msg.inTk||0)+(msg.outTk||0)).toLocaleString()} tk</span><span>·</span><span>${estimateCost(conv?.model,msg.inTk||0,msg.outTk||0).toFixed(5)}</span></>
                )}
                {msg.role === 'assistant' && !msg.done && (
                  <><span className="streaming-dot" style={{ width:6, height:6 }} /><span>en cours…</span></>
                )}
                {/* 🔊 TTS button — always visible on mobile for assistant, hover on desktop */}
                {msg.role === 'assistant' && msg.done && msg.content && (
                  <button
                    onClick={() => handleSpeak(msg)}
                    title={speakingId === msg.id ? 'Arrêter la lecture' : 'Lire à voix haute'}
                    style={{ ...ACT_BTN, marginLeft: (msg.inTk || msg.outTk) ? 4 : 'auto', opacity: isMobile ? 1 : (hoveredId === msg.id ? 1 : 0), transition:'opacity .15s', padding:'1px 6px', background: speakingId === msg.id ? '#eef3fd' : 'transparent', borderColor: speakingId === msg.id ? C.blue : '#e0ddd4', color: speakingId === msg.id ? C.blue : '#888' }}>
                    {speakingId === msg.id
                      ? <span className="speaking-wave"><span/><span/><span/></span>
                      : '🔊'}
                  </button>
                )}
                {hoveredId === msg.id && msg.done && !state.streaming && (
                  <div style={{ display:'flex', gap:4, marginLeft:'auto' }}>
                    <button onClick={() => navigator.clipboard.writeText(msg.content)}
                      style={ACT_BTN}>copier</button>
                    {msg.role === 'user' && (
                      <button onClick={() => handleEdit(msg)} style={ACT_BTN}>✏️ modifier</button>
                    )}
                    {isLastDone && (
                      <><button onClick={handleRegenerate} style={ACT_BTN}>↺ régénérer</button>
                      <button onClick={exportMd} style={ACT_BTN}>⬇ .md</button></>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}
const ACT_BTN = { background:'none', border:'1px solid #e0ddd4', borderRadius:4, padding:'1px 7px', fontSize:11, cursor:'pointer', color:'#888', fontFamily:'inherit' };

// ─── Input Area ───────────────────────────────────────────────
function InputArea({ tabId, placeholder }) {
  const { state, dispatch, sendMessage } = useApp();
  const isMobile = useIsMobile();
  const [text, setText] = useState('');
  const [attachments, setAttachments] = useState([]);
  const [imageMode, setImageMode] = useState(false);
  const [imgGenerating, setImgGenerating] = useState(false);
  const [showImgPicker, setShowImgPicker] = useState(false);
  const taRef = useRef(null);
  const abortRef = useRef(null);
  const fileRef = useRef(null);

  // ── Voice input ──
  const onVoiceResult = useCallback((transcript) => {
    setText(prev => (prev ? prev + ' ' : '') + transcript);
    setTimeout(() => {
      if (taRef.current) {
        taRef.current.style.height = 'auto';
        taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + 'px';
      }
    }, 0);
  }, []);
  const { listening, supported: voiceSupported, toggle: toggleVoice, interimText } = useVoiceInput(onVoiceResult);
  const t = state.tabs[tabId];
  const conv = t?.convs.find(c => c.id === t.activeId);
  const model = getModel(conv?.model);
  const hasKey = !!state.settings.apiKey;

  // Listen for edit events from ChatThread
  useEffect(() => {
    const h = (e) => {
      if (e.detail.tabId !== tabId) return;
      setText(e.detail.content);
      if (taRef.current) {
        taRef.current.style.height = 'auto';
        taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + 'px';
        taRef.current.focus();
      }
    };
    window.addEventListener('ricard-edit', h);
    return () => window.removeEventListener('ricard-edit', h);
  }, [tabId]);

  // Context window %
  const ctxLength = getModel(conv?.model)?.ctx || '?';
  const usedTk = (conv?.totalIn || 0) + (conv?.totalOut || 0);
  const maxTk = typeof ctxLength === 'string' && ctxLength.endsWith('k') ? parseInt(ctxLength) * 1000 : (ctxLength.endsWith?.('M') ? parseInt(ctxLength) * 1000000 : null);
  const ctxPct = maxTk ? Math.min(100, Math.round(usedTk / maxTk * 100)) : null;


  const handleFiles = (e) => {
    Array.from(e.target.files || []).forEach(file => {
      if (file.size > 12 * 1024 * 1024) { alert(`${file.name} dépasse 12 Mo`); return; }
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        setAttachments(prev => [...prev, {
          id: uuid(),
          name: file.name,
          type: file.type.startsWith('image/') ? 'image' : 'pdf',
          mimeType: file.type,
          data: dataUrl.split(',')[1],
          preview: file.type.startsWith('image/') ? dataUrl : null,
          size: file.size,
        }]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };
  const removeAttachment = (id) => setAttachments(prev => prev.filter(a => a.id !== id));

  const submit = useCallback(async () => {
    if ((!text.trim() && !attachments.length) || state.streaming || imgGenerating) return;
    if (!hasKey) { dispatch({ type:'TOGGLE_SETTINGS' }); return; }

    // ── Mode génération d'image ──────────────────────────
    if (imageMode && text.trim()) {
      const prompt = text.trim();
      const imgModel = state.settings.defaultImageModel || 'openai/dall-e-3';
      const userMsgId = uuid();
      const imgMsgId  = uuid();
      // Message utilisateur
      dispatch({ type:'ADD_MSG', payload:{ tabId, msg:{ role:'user', content:`🎨 ${prompt}`, id:userMsgId, done:true, inTk:0, outTk:0 } } });
      // Placeholder image (en cours)
      dispatch({ type:'ADD_MSG', payload:{ tabId, msg:{ role:'assistant', type:'image', imagePrompt:prompt, imageUrl:null, id:imgMsgId, done:false, inTk:0, outTk:0 } } });
      setText('');
      if (taRef.current) taRef.current.style.height = 'auto';
      setImgGenerating(true);
      await generateImage({
        apiKey: state.settings.apiKey,
        model:  imgModel,
        prompt,
        onDone: ({ url, revised }) => {
          dispatch({ type:'UPDATE_IMAGE_MSG', payload:{ tabId, id:imgMsgId, imageUrl:url, revisedPrompt:revised } });
          setImgGenerating(false);
        },
        onError: (errMsg) => {
          dispatch({ type:'UPDATE_IMAGE_MSG', payload:{ tabId, id:imgMsgId, imageUrl:null, error:errMsg } });
          setImgGenerating(false);
        },
      });
      return;
    }

    // ── Mode texte normal ────────────────────────────────
    sendMessage({ tabId, content: text.trim(), attachments, abortRef });
    setText('');
    setAttachments([]);
    if (taRef.current) taRef.current.style.height = 'auto';
  }, [text, attachments, state.streaming, imgGenerating, imageMode, hasKey, tabId, sendMessage, dispatch, state.settings]);

  const onKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } };
  const onInput = e => { setText(e.target.value); e.target.style.height='auto'; e.target.style.height = Math.min(e.target.scrollHeight,160)+'px'; };

  return (
    <div style={{ padding: isMobile ? '10px 12px' : '12px 16px', borderTop:`1.5px solid #e8e5dc`, background:'white', flexShrink:0 }}>
      {!hasKey && (
        <div style={{ marginBottom:8, padding:'8px 12px', background:'#fff5e6', border:`1px solid ${C.orange}`, borderRadius:8, fontSize:12, color:'#c07030', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span>Clé API OpenRouter requise pour envoyer des messages.</span>
          <button onClick={() => dispatch({ type:'TOGGLE_SETTINGS' })} style={{ background:C.orange, border:'none', borderRadius:6, color:'white', padding:'3px 10px', fontSize:12, cursor:'pointer', fontWeight:600 }}>Configurer →</button>
        </div>
      )}
      {/* Hidden file input */}
      <input ref={fileRef} type="file" accept="image/*,.pdf" multiple style={{ display:'none' }} onChange={handleFiles} />

      <div style={{ border:`4px solid ${C.ink}`, borderRadius:'var(--pc-radius-3)', background:'white', overflow:'hidden', boxShadow:`var(--pc-shadow)` }}>
        {/* Attachment previews */}
        {attachments.length > 0 && (
          <div style={{ display:'flex', gap:6, padding:'8px 10px 0', flexWrap:'wrap' }}>
            {attachments.map(att => (
              <div key={att.id} style={{ position:'relative', borderRadius:8, overflow:'hidden', border:`1.5px solid ${C.faint}`, flexShrink:0 }}>
                {att.type === 'image' ? (
                  <img src={att.preview} alt={att.name} style={{ width:60, height:60, objectFit:'cover', display:'block' }} />
                ) : (
                  <div style={{ width:60, height:60, background:'#f1eee5', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, padding:4 }}>
                    <span style={{ fontSize:22 }}>📄</span>
                    <span style={{ fontSize:8, color:C.muted, textAlign:'center', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', width:52 }}>{att.name}</span>
                  </div>
                )}
                <button onClick={() => removeAttachment(att.id)}
                  style={{ position:'absolute', top:2, right:2, background:'rgba(0,0,0,.55)', border:'none', borderRadius:'50%', width:16, height:16, cursor:'pointer', color:'white', fontSize:11, display:'flex', alignItems:'center', justifyContent:'center', padding:0, lineHeight:1 }}>×</button>
              </div>
            ))}
          </div>
        )}

        {/* Mode image — bannière colorée */}
        {imageMode && (
          <div style={{ padding:'6px 14px', background:'linear-gradient(90deg,#a855f720,#ec489920)', borderBottom:`1px solid #e0ddd4`, fontSize:12, color:'#7c3aed', display:'flex', alignItems:'center', gap:6 }}>
            <span>🎨</span>
            <span style={{ fontWeight:600 }}>Mode Illustration</span>
            <span style={{ color:'#aaa', marginLeft:4 }}>— Décris l'image à générer</span>
            <span style={{ marginLeft:'auto', fontSize:11, color:'#aaa' }}>{IMAGE_MODELS.find(m=>m.id===state.settings.defaultImageModel)?.name || 'DALL·E 3'}</span>
          </div>
        )}
        <textarea ref={taRef} value={text} onChange={onInput} onKeyDown={onKey}
          placeholder={
            listening ? '🎤 En écoute… parlez maintenant' :
            imageMode ? '🎨 Décris l\'illustration à créer…' :
            (placeholder || 'Écris ton message… (Entrée pour envoyer)')
          }
          disabled={state.streaming || imgGenerating} rows={1}
          style={{ width:'100%', padding:'12px 14px', border:'none', outline:'none', resize:'none', fontFamily:'Inter,sans-serif', fontSize:16, lineHeight:1.6, background:'transparent', color:C.ink, minHeight:44, boxSizing:'border-box' }} />
        {interimText && (
          <div style={{ padding:'0 14px 8px', fontSize:13, color:'#aaa', fontStyle:'italic', lineHeight:1.4 }}>
            <span style={{ opacity:.7 }}>🎤 </span>{interimText}…
          </div>
        )}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 10px 8px', gap:8 }}>
          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            {/* Bouton mode image 🎨 */}
            <button
              onClick={() => setImageMode(v => !v)}
              title={imageMode ? 'Revenir au chat texte' : 'Générer une illustration'}
              style={{ background: imageMode ? '#7c3aed' : '#f1eee5', border:`1px solid ${imageMode ? '#7c3aed' : C.faint}`, borderRadius:20, padding:'3px 10px', fontSize:14, cursor:'pointer', color: imageMode ? 'white' : '#555', display:'flex', alignItems:'center', gap:3, flexShrink:0, transition:'all .15s' }}>
              🎨
            </button>
            {/* Attach button (masqué en mode image) */}
            {!imageMode && (
              <button onClick={() => fileRef.current?.click()} title="Joindre image ou PDF"
                style={{ background: attachments.length ? C.blue : '#f1eee5', border:`1px solid ${attachments.length ? C.blue : C.faint}`, borderRadius:20, padding:'3px 10px', fontSize:14, cursor:'pointer', color: attachments.length ? 'white' : '#555', display:'flex', alignItems:'center', gap:3, flexShrink:0 }}>
                📎{attachments.length > 0 && <span style={{ fontSize:11, fontWeight:700 }}>{attachments.length}</span>}
              </button>
            )}
            {/* Mic button */}
            {voiceSupported && !imageMode && (
              <button
                onClick={toggleVoice}
                className={listening ? 'mic-active' : ''}
                title={listening ? 'Arrêter la reconnaissance vocale' : 'Parler'}
                style={{ background: listening ? C.red : '#f1eee5', border:`1px solid ${listening ? C.red : C.faint}`, borderRadius:'50%', width: isMobile ? 40 : 32, height: isMobile ? 40 : 32, cursor:'pointer', color: listening ? 'white' : '#888', display:'flex', alignItems:'center', justifyContent:'center', fontSize: isMobile ? 18 : 15, flexShrink:0, transition:'background .2s,border-color .2s' }}>
                🎤
              </button>
            )}
            {/* Sélecteur modèle — texte ou image */}
            {imageMode ? (
              <>
                <button onClick={() => setShowImgPicker(true)}
                  title="Choisir le modèle d'illustration"
                  style={{ background:'#f3e8ff', border:`1.5px solid #7c3aed`, borderRadius:20, padding:'4px 12px', fontSize:12, cursor:'pointer', color:'#7c3aed', display:'flex', alignItems:'center', gap:4, maxWidth: isMobile ? 140 : 220, overflow:'hidden' }}>
                  <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {IMAGE_MODELS.find(m => m.id === state.settings.defaultImageModel)?.name
                      || state.settings.defaultImageModel?.split('/').pop()
                      || 'DALL·E 3'}
                  </span>
                  <span style={{ color:'#a855f7', fontSize:10, flexShrink:0 }}>▾</span>
                </button>
                {showImgPicker && (
                  <ImageModelPickerModal
                    current={state.settings.defaultImageModel}
                    onSelect={val => {
                      const next = { ...state.settings, defaultImageModel: val };
                      dispatch({ type:'SET_SETTINGS', payload: next });
                      saveSettings(next);
                    }}
                    onClose={() => setShowImgPicker(false)}
                  />
                )}
              </>
            ) : (
              <>
                <button onClick={() => dispatch({ type:'TOGGLE_MODEL_PICKER' })}
                  style={{ background:'#f1eee5', border:`1px solid ${C.faint}`, borderRadius:20, padding:'4px 12px', fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:4, color:'#555' }}>
                  {model?.name} <span style={{ color:'#aaa', fontSize:11 }}>▾</span>
                </button>
                {model?.inCost && !isMobile ? <span style={{ fontSize:11, color:'#aaa' }}>${model.inCost}/M</span> : null}
              </>
            )}
          </div>
          <div style={{ display:'flex', gap:6 }}>

function DesignTab() {
  const { state, dispatch } = useApp();
  const [showPreview, setShowPreview] = useState(false);
  const t = state.tabs['design'];
  const conv = t?.convs.find(c => c.id === t.activeId);

  const previewCode = useMemo(() => {
    if (!conv?.messages) return null;
    for (let i = conv.messages.length - 1; i >= 0; i--) {
      const msg = conv.messages[i];
      if (msg.role !== 'assistant' || !msg.done) continue;
      const blocks = parseBlocks(msg.content);
      for (let j = blocks.length - 1; j >= 0; j--) {
        const b = blocks[j];
        const l = (b.lang || '').toLowerCase();
        if (b.type === 'code' && (l === 'html' || l === 'svg')) return { lang: l, content: b.content };
      }
    }
    return null;
  }, [conv?.messages]);

  const previewSrc = previewCode
    ? (previewCode.lang === 'svg'
        ? `<!DOCTYPE html><html><body style="margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f8f8">${previewCode.content}</body></html>`
        : previewCode.content)
    : null;

  const downloadPreview = () => {
    if (!previewCode) return;
    const mime = previewCode.lang === 'svg' ? 'image/svg+xml' : 'text/html';
    const blob = new Blob([previewCode.content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `design.${previewCode.lang}`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', minHeight:0 }}>
      <div style={{ padding:'10px 20px', borderBottom:'1.5px solid #e8e5dc', background:'white', display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, minHeight:52, flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
          <span style={{ fontSize:18 }}>🎨</span>
          <span style={{ fontSize:16, fontWeight:600, color:C.ink, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:260 }}>
            {conv?.title !== 'Nouvelle conversation' ? conv?.title : 'Design'}
          </span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {previewCode && (
            <button onClick={() => setShowPreview(v => !v)}
              style={{ background: showPreview ? C.teal : '#f7f4ec', color: showPreview ? 'white' : '#555', border: showPreview ? 'none' : '1px solid #e8e5dc', borderRadius:20, padding:'4px 12px', fontSize:12, cursor:'pointer', fontWeight:600 }}>
              {showPreview ? '💬 Chat' : '👁 Aperçu'}
            </button>
          )}
          {showPreview && previewCode && (
            <button onClick={downloadPreview}
              style={{ background:C.ink, border:'none', borderRadius:20, padding:'4px 12px', fontSize:12, cursor:'pointer', color:'white', fontWeight:600 }}>
              ⬇ .{previewCode.lang}
            </button>
          )}
          <button onClick={() => { dispatch({ type:'NEW_CONV', payload:{ tabId:'design' } }); setShowPreview(false); }}
            style={{ background:'none', border:'1px solid #e8e5dc', borderRadius:6, width:28, height:28, cursor:'pointer', color:C.muted, fontSize:16, display:'flex', alignItems:'center', justifyContent:'center', padding:0 }}
            title="Nouvelle conversation">+</button>
        </div>
      </div>

      {showPreview && previewSrc ? (
        <div style={{ flex:1, display:'flex', flexDirection:'column', minHeight:0 }}>
          <div style={{ padding:'5px 14px', background:'#eae6dc', fontSize:11, color:'#888', flexShrink:0 }}>
            Aperçu live · {previewCode.lang.toUpperCase()} · dernière réponse
          </div>
          <iframe srcDoc={previewSrc} sandbox="allow-scripts allow-same-origin"
            style={{ flex:1, border:'none', width:'100%' }} />
        </div>
      ) : (
        !conv?.messages?.length
          ? <EmptyState tabId="design" title="Mode Design — SVG, HTML/CSS, palettes, maquettes" suggestions={['🎨 Crée un logo SVG','🖼️ Génère une maquette HTML/CSS','🌈 Propose une palette de couleurs',"📐 Wireframe une page d'accueil",'💅 Améliore ce design','🎭 Mood board textuel']} />

      )}

    </div>
  );
}

function FamilyTab() {
  const { state } = useApp();
  const isMobile = useIsMobile();
  const [view, setView]   = useState('messages'); // 'messages' | 'dashboard'
  const [msgs, setMsgs]   = useState(() => lsGet('family_msgs', []));
  const [text, setText]   = useState('');
  const bottomRef         = useRef(null);
  const profile           = getProfile(state.profile);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollTop = bottomRef.current.scrollHeight;
  }, [msgs]);

  // Sync from Firebase on mount
  useEffect(() => {
    if (!CLOUD.enabled) return;
    CLOUD.db.collection('ricard_family').doc(getFamilyId()).get().then(doc => {
      if (doc.exists) {
        const remote = doc.data().msgs || [];
        if (remote.length) { setMsgs(remote); lsSet('family_msgs', remote); }
      }
    }).catch(() => {});
  }, []);

  const post = () => {
    if (!text.trim()) return;
    const newMsg = { id: uuid(), from: profile?.name || state.profile, fromId: state.profile, content: text.trim(), ts: Date.now() };
    const updated = [...msgs, newMsg];
    setMsgs(updated);
    lsSet('family_msgs', updated);
    setText('');
    // Save to Firebase
    if (CLOUD.enabled) {
      CLOUD.db.collection('ricard_family').doc(getFamilyId()).set({ msgs: updated.slice(-100) }).catch(() => {});
    }
  };

  const profileColor = (fromId) => getProfile(fromId)?.color || C.muted;

  // Données dashboard
  const weekAgo   = Date.now() - 7 * 24 * 3600 * 1000;
  const costLog   = loadCostLog();
  const weekMsgs  = pid => costLog.filter(e => e.profile === pid && e.ts >= weekAgo).length;
  const dailyGoals = state.settings.dailyGoals || {};

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', minHeight:0, background:'#f0faf8' }}>

          </div>
        </div>

        </div>
      </div>

      {/* Vue Dashboard */}
      {view === 'dashboard' && (
        <div className="scroll-y" style={{ flex:1, minHeight:0, padding: isMobile ? '16px 12px' : '20px 28px', display:'flex', flexDirection:'column', gap:20 }}>
          {/* Cards profils */}
          <div>
            <div style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, color:'#888', marginBottom:12 }}>Progression de la famille</div>
            <div style={{ display:'grid', gridTemplateColumns: isMobile ? 'repeat(2,1fr)' : 'repeat(4,1fr)', gap:12 }}>
              {PROFILES.map(p => {
                const streak = getStreak(p.id);
                const xp     = getXP(p.id);
                const rank   = getRank(xp);
                const msgs7  = weekMsgs(p.id);
                return (
                  <div key={p.id} style={{ background:'white', border:`3px solid ${C.ink}`, borderRadius:'var(--pc-radius-3)', padding:'14px 12px', display:'flex', flexDirection:'column', alignItems:'center', gap:8, boxShadow:`4px 4px 0 ${C.ink}` }}>
                    <div style={{ width:44, height:44, borderRadius:'50%', background:p.color, border:`2px solid ${C.ink}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, fontFamily:"'Permanent Marker',cursive", fontWeight:700 }}>{p.label}</div>
                    <div style={{ fontFamily:'var(--pc-font-display)', fontSize:15, color:C.ink }}>{p.name}</div>
                    <div style={{ fontSize:18, fontWeight:700, background:'#fff7e6', padding:'3px 10px', borderRadius:999, border:`1.5px solid #fbbf24`, color:'#92400e' }}>{streak > 0 ? `🔥 ${streak}j` : '—'}</div>
                    <div style={{ fontSize:11, padding:'2px 8px', borderRadius:999, border:`1.5px solid #e8e5dc`, color:'#555', background:'#f7f4ec' }}>{rank.label}</div>
                    <div style={{ fontSize:11, color:C.muted }}>{msgs7} msg cette semaine</div>
                    {/* Barre XP */}
                    {(() => {
                      const curRank  = rank;
                      const nextRank = RANKS.find(r => r.min > curRank.min);
                      if (!nextRank) return <div style={{ fontSize:10, color:C.teal }}>Rang max atteint !</div>;
                      const pct = Math.min(100, ((xp - curRank.min) / (nextRank.min - curRank.min)) * 100);
                      return (
                        <div style={{ width:'100%' }}>
                          <div style={{ fontSize:10, color:'#aaa', textAlign:'right', marginBottom:2 }}>{xp}/{nextRank.min}</div>
                          <div style={{ height:5, background:C.shade, borderRadius:999, overflow:'hidden' }}>
                            <div style={{ height:'100%', width:`${pct}%`, background: curRank.color, borderRadius:999, transition:'width .5s' }} />
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Objectifs en cours */}
          {(dailyGoals.zya || dailyGoals.zelie) && (
            <div>
              <div style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, color:'#888', marginBottom:10 }}>🎯 Objectifs en cours</div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {['zya','zelie'].filter(pid => dailyGoals[pid]).map(pid => {
                  const p = getProfile(pid);
                  return (
                    <div key={pid} style={{ background:'white', border:`2px solid ${p?.color}`, borderRadius:10, padding:'10px 14px', display:'flex', alignItems:'center', gap:10 }}>
                      <div style={{ width:28, height:28, borderRadius:'50%', background:p?.color, border:`1.5px solid ${C.ink}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontFamily:"'Permanent Marker',cursive", fontWeight:700, flexShrink:0 }}>{p?.label}</div>
                      <div>
                        <div style={{ fontSize:11, fontWeight:600, color:p?.color }}>{p?.name}</div>
                        <div style={{ fontSize:13, color:C.ink }}>{dailyGoals[pid]}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Classement semaine */}
          <div>
            <div style={{ fontSize:13, fontWeight:700, textTransform:'uppercase', letterSpacing:.8, color:'#888', marginBottom:10 }}>📈 Activité cette semaine</div>
            <div style={{ background:'white', border:`2px solid ${C.ink}`, borderRadius:10, overflow:'hidden' }}>
              {[...PROFILES].sort((a,b) => weekMsgs(b.id) - weekMsgs(a.id)).map((p, i) => {
                const n = weekMsgs(p.id);
                const maxN = Math.max(...PROFILES.map(x => weekMsgs(x.id)), 1);
                return (
                  <div key={p.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px', borderBottom: i < 3 ? `1px solid ${C.shade}` : 'none' }}>
                    <span style={{ fontSize:13, color:'#aaa', width:16, textAlign:'center' }}>{['🥇','🥈','🥉',''][i] || i+1}</span>
                    <div style={{ width:24, height:24, borderRadius:'50%', background:p.color, border:`1.5px solid ${C.ink}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, fontFamily:"'Permanent Marker',cursive", fontWeight:700, flexShrink:0 }}>{p.label}</div>
                    <span style={{ flex:1, fontSize:14 }}>{p.name}</span>
                    <div style={{ width:80, height:6, background:C.shade, borderRadius:999, overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${(n/maxN)*100}%`, background:p.color, borderRadius:999 }} />
                    </div>
                    <span style={{ fontSize:13, fontWeight:600, color:C.ink, width:28, textAlign:'right' }}>{n}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
      {/* Vue Messages */}
      <div ref={bottomRef} className="scroll-y" style={{ flex:1, minHeight:0, padding: isMobile ? '12px 10px' : '20px 24px', display: view === 'messages' ? 'flex' : 'none', flexDirection:'column', gap:10 }}>
        {msgs.length === 0 && (
          <div style={{ textAlign:'center', color:C.muted, marginTop:40, fontSize:14 }}>
            <div style={{ fontSize:40, marginBottom:12 }}>👨‍👩‍👧</div>
            <div>Aucun message encore. Soyez le premier à écrire !</div>
          </div>
        )}
        {msgs.map(m => {
          const isMe = m.fromId === state.profile;
          return (
            <div key={m.id} style={{ display:'flex', justifyContent: isMe ? 'flex-end' : 'flex-start', gap:8 }}>
              {!isMe && (
                <div style={{ width:28, height:28, borderRadius:'50%', background:profileColor(m.fromId), border:`2px solid ${C.ink}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontFamily:"'Permanent Marker',cursive", fontWeight:700, flexShrink:0, color:'white', marginTop:2 }}>
                  {m.from?.[0]?.toUpperCase() || '?'}
                </div>
              )}
              <div style={{ maxWidth:'72%' }}>
                {!isMe && <div style={{ fontSize:11, color:profileColor(m.fromId), fontWeight:600, marginBottom:2, paddingLeft:2 }}>{m.from}</div>}
                <div style={{ background: isMe ? C.teal : 'white', color: isMe ? 'white' : C.ink, border:`1.5px solid ${isMe ? C.teal : '#b8e0d8'}`, borderRadius: isMe ? '14px 14px 4px 14px' : '14px 14px 14px 4px', padding:'10px 14px', fontSize:14, lineHeight:1.5, boxShadow:'2px 2px 0 rgba(0,0,0,.06)' }}>
                  {m.content}
                </div>
                <div style={{ fontSize:11, color:'#aaa', marginTop:2, paddingLeft:4, textAlign: isMe ? 'right' : 'left' }}>
                  {new Date(m.ts).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })}
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ padding: isMobile ? '8px 10px' : '12px 16px', borderTop:`1.5px solid #b8e0d8`, background:'white', flexShrink:0, display: view === 'messages' ? 'flex' : 'none', gap:8 }}>
        <textarea value={text} onChange={e => setText(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); post(); } }}
          placeholder="Écrire un message à la famille…" rows={1}
          style={{ flex:1, padding:'10px 14px', border:`2px solid ${C.teal}`, borderRadius:10, fontSize:14, fontFamily:'Inter,sans-serif', resize:'none', outline:'none', background:C.paper }} />
        <button onClick={post} disabled={!text.trim()}
          style={{ background: text.trim() ? C.teal : C.faint, border:'none', borderRadius:10, color:'white', width:44, height:44, cursor: text.trim() ? 'pointer' : 'not-allowed', fontSize:18, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>↑</button>
      </div>
    </div>
  );
}

// ─── Search Modal ──────────────────────────────────────────────
function SearchModal() {
  const { state, dispatch } = useApp();
  const [q, setQ] = useState('');
  const inputRef = useRef(null);
  const isMobile = useIsMobile();

  useEffect(() => { if (state.showSearch && inputRef.current) { setQ(''); inputRef.current.focus(); } }, [state.showSearch]);
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') dispatch({ type:'TOGGLE_SEARCH' }); };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  }, []);

  if (!state.showSearch) return null;

  const results = [];
  if (q.trim().length >= 2) {
    const qlow = q.toLowerCase();
    TABS.forEach(tabId => {
      const ts = state.tabs[tabId];
      if (!ts) return;
      ts.convs.forEach(conv => {
        const titleMatch = conv.title.toLowerCase().includes(qlow);
        const msgMatch = conv.messages.find(m => m.content?.toLowerCase().includes(qlow));
        if (titleMatch || msgMatch) {
          const snippet = msgMatch ? msgMatch.content.slice(0, 80) : conv.title;
          results.push({ tabId, conv, snippet });
        }
      });
    });
  }

  const go = ({ tabId, conv }) => {
    dispatch({ type:'SET_TAB', payload: tabId });
    dispatch({ type:'SELECT_CONV', payload:{ tabId, convId: conv.id } });
    dispatch({ type:'TOGGLE_SEARCH' });
  };

  return (
    <>
      <div onClick={() => dispatch({ type:'TOGGLE_SEARCH' })} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.35)', zIndex:200 }} />
      <div style={{ position:'fixed', top: isMobile ? '8%' : '15%', left:'50%', transform:'translateX(-50%)', width: isMobile ? 'calc(100vw - 24px)' : 560, background:'white', border:`2px solid ${C.ink}`, borderRadius:14, boxShadow:'6px 8px 0 rgba(0,0,0,.15)', zIndex:201, overflow:'hidden' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, padding:'12px 14px', borderBottom:`1px solid #e8e5dc` }}>
          <span style={{ fontSize:16, color:'#aaa' }}>🔍</span>
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)}
            placeholder="Rechercher dans les conversations…"
            style={{ flex:1, border:'none', outline:'none', fontSize:15, fontFamily:'Inter,sans-serif', color:C.ink }} />
          <button onClick={() => dispatch({ type:'TOGGLE_SEARCH' })} style={{ background:'none', border:'none', cursor:'pointer', color:'#aaa', fontSize:18 }}>✕</button>
        </div>
        <div style={{ maxHeight:380, overflowY:'auto' }}>
          {q.trim().length < 2 && (
            <div style={{ padding:'24px', textAlign:'center', color:'#aaa', fontSize:13 }}>Tapez au moins 2 caractères pour chercher</div>
          )}
          {q.trim().length >= 2 && results.length === 0 && (
            <div style={{ padding:'24px', textAlign:'center', color:'#aaa', fontSize:13 }}>Aucun résultat pour "{q}"</div>
          )}
          {results.map((r, i) => (
            <button key={i} onClick={() => go(r)}
              style={{ display:'block', width:'100%', padding:'10px 14px', border:'none', borderBottom:`1px solid #f0ede4`, background:'transparent', cursor:'pointer', textAlign:'left' }}
              onMouseEnter={e => e.currentTarget.style.background='#f7f4ec'}
              onMouseLeave={e => e.currentTarget.style.background='transparent'}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:3 }}>
                <span style={{ fontSize:12, background:C.shade, padding:'1px 6px', borderRadius:10, color:C.muted }}>{r.tabId}</span>
                <span style={{ fontSize:13, fontWeight:600, color:C.ink }}>{r.conv.title}</span>
              </div>
              <div style={{ fontSize:12, color:'#888', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.snippet}</div>
            </button>
          ))}
        </div>
        <div style={{ padding:'8px 14px', fontSize:11, color:'#bbb', borderTop:`1px solid #f0ede4` }}>Esc pour fermer · Ctrl+F pour ouvrir</div>
      </div>
    </>
  );
}

// ─── Compare Modal ─────────────────────────────────────────────
// Mini-picker searchable utilisé dans chaque colonne modèle
// ModelSlot — picker inline (pas de position:absolute → pas de clipping dans le modal)
function ModelSlot({ label, selected, onSelect, allModels, loading }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const selectedModel = allModels.find(m => m.id === selected) || getModel(selected);

  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    if (!q) return allModels.slice(0, 80);
    return allModels.filter(m =>
      m.name?.toLowerCase().includes(q) ||
      m.id?.toLowerCase().includes(q) ||
      m.provider?.toLowerCase().includes(q)
    ).slice(0, 150);
  }, [search, allModels]);

  return (
    <div style={{ flex:1, minWidth:0 }}>
      {/* Label */}
      <div style={{ fontSize:11, color:'#888', marginBottom:4, fontWeight:700, letterSpacing:.8, textTransform:'uppercase' }}>
        Modèle {label} {loading && <span className="streaming-dot" style={{ display:'inline-block', width:5, height:5, marginLeft:4 }} />}
      </div>
      {/* Trigger */}
      <button onClick={() => { setOpen(v => !v); setSearch(''); }}
        style={{ width:'100%', padding:'8px 12px', border:`1.5px solid ${open ? C.blue : C.faint}`, borderRadius: open ? '8px 8px 0 0' : 8, background:'white', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, fontSize:13, textAlign:'left', transition:'border-color .15s' }}>
        <div style={{ minWidth:0, flex:1 }}>
          <div style={{ fontWeight:600, color:C.ink, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {selectedModel?.name || selected}
          </div>
          <div style={{ fontSize:11, color:'#aaa' }}>
            {selectedModel?.provider || ''}{selectedModel?.inCost === 0 ? ' · Gratuit' : selectedModel?.inCost ? ` · $${selectedModel.inCost}/M` : ''}
          </div>
        </div>
        <span style={{ color:'#aaa', flexShrink:0, fontSize:11 }}>{open ? '▴' : '▾'}</span>
      </button>

      {/* Liste inline — s'étend dans le flux, zéro clipping */}
      {open && (
        <div style={{ border:`1.5px solid ${C.blue}`, borderTop:'none', borderRadius:'0 0 8px 8px', overflow:'hidden', marginBottom:4 }}>
          {/* Recherche */}
          <div style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 10px', background:'#f7f4ec', borderBottom:`1px solid #e8e5dc`, flexShrink:0 }}>
            <span style={{ color:'#aaa', fontSize:13 }}>🔍</span>
            <input autoFocus value={search} onChange={e => setSearch(e.target.value)}
              placeholder={`Chercher parmi ${allModels.length} modèles…`}
              style={{ flex:1, border:'none', outline:'none', fontSize:13, background:'transparent', color:C.ink }} />
            {search && <button onClick={() => setSearch('')} style={{ background:'none', border:'none', cursor:'pointer', color:'#aaa', fontSize:14, padding:0, lineHeight:1 }}>×</button>}
          </div>
          {/* Liste scrollable avec fix iOS */}
          <div className="scroll-y" style={{ maxHeight:240, background:'white' }}>
            {filtered.length === 0 && (
              <div style={{ padding:20, textAlign:'center', color:'#aaa', fontSize:13 }}>Aucun modèle trouvé</div>
            )}
            {filtered.map(m => {
              const isCur = m.id === selected;
              return (
                <button key={m.id} onClick={() => { onSelect(m.id); setOpen(false); setSearch(''); }}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 12px', width:'100%', background: isCur ? '#fffaee' : 'transparent', border:'none', borderBottom:`1px solid #f7f4ec`, cursor:'pointer', textAlign:'left', gap:8 }}
                  onMouseEnter={e => { if (!isCur) e.currentTarget.style.background='#f9f7f2'; }}
                  onMouseLeave={e => { if (!isCur) e.currentTarget.style.background = isCur ? '#fffaee' : 'transparent'; }}>
                  <div style={{ minWidth:0, flex:1 }}>
                    <div style={{ fontSize:13, fontWeight: isCur ? 700 : 400, color:C.ink, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                      {isCur ? '✓ ' : ''}{m.name}
                    </div>
                    <div style={{ fontSize:11, color:'#aaa' }}>{m.provider} · {m.ctx || '?'}</div>
                  </div>
                  <span style={{ flexShrink:0, fontSize:12, fontWeight:600, color: m.inCost === 0 ? C.green : '#555' }}>
                    {m.inCost === 0 ? 'Gratuit' : m.inCost ? `$${m.inCost}/M` : '?'}
                  </span>
                </button>
              );
            })}
            {!search && allModels.length > 80 && (
              <div style={{ padding:'8px 12px', textAlign:'center', fontSize:11, color:'#aaa' }}>
                Tape pour chercher parmi {allModels.length} modèles
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function CompareModal() {
  const { state, dispatch } = useApp();
  const [modelA, setModelA] = useState(DEFAULT_MODEL);
  const [modelB, setModelB] = useState('openai/gpt-4o-mini');
  const [prompt, setPrompt] = useState('');
  const [resA, setResA] = useState('');
  const [resB, setResB] = useState('');
  const [loadingA, setLoadingA] = useState(false);
  const [loadingB, setLoadingB] = useState(false);
  const { models: allModels, status: fetchStatus } = useLiveModels();
  const isMobile = useIsMobile();

  useEffect(() => {
    const h = e => { if (e.key === 'Escape') dispatch({ type:'TOGGLE_COMPARE' }); };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  }, []);

  if (!state.showCompare) return null;

  const running = loadingA || loadingB;

  const runCompare = () => {
    if (!prompt.trim() || !state.settings.apiKey || running) return;
    setResA(''); setResB('');
    setLoadingA(true); setLoadingB(true);
    const msgs = [{ role:'user', content: prompt.trim() }];
    streamChat({ apiKey: state.settings.apiKey, model: modelA, messages: msgs,
      onChunk: (_, full) => setResA(full),
      onDone: ({ text }) => { setResA(text || '(vide)'); setLoadingA(false); },
      onError: e  => { setResA('⚠️ ' + e); setLoadingA(false); },
    });
    streamChat({ apiKey: state.settings.apiKey, model: modelB, messages: msgs,
      onChunk: (_, full) => setResB(full),
      onDone: ({ text }) => { setResB(text || '(vide)'); setLoadingB(false); },
      onError: e  => { setResB('⚠️ ' + e); setLoadingB(false); },
    });
  };

  // ── Rendu mobile : plein écran, tout scrollable dans un seul conteneur ──
  if (isMobile) {
    return (
      <div style={{ position:'fixed', inset:0, zIndex:200, background:'white', display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Header */}
        <div style={{ padding:'10px 14px', paddingTop:'max(10px, env(safe-area-inset-top, 10px))', borderBottom:`1.5px solid #e8e5dc`, background:'white', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
            <span style={{ fontSize:15, fontWeight:700 }}>⚡ Comparaison</span>
            {fetchStatus === 'loading' && <span style={{ fontSize:10, color:'#aaa', background:'#f7f4ec', padding:'2px 6px', borderRadius:999 }}>⏳ chargement…</span>}
            {fetchStatus === 'done' && <span style={{ fontSize:10, color:C.green, background:'#edfaed', padding:'2px 6px', borderRadius:999 }}>✓ {allModels.length} modèles</span>}
          </div>
          <button onClick={() => dispatch({ type:'TOGGLE_COMPARE' })} style={{ background:'none', border:'none', cursor:'pointer', fontSize:22, color:'#888', minWidth:44, minHeight:44, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
        </div>

        {/* Tout le contenu dans un seul scroll vertical */}
        <div className="scroll-y" style={{ flex:1, minHeight:0, padding:'12px 14px', display:'flex', flexDirection:'column', gap:14 }}>
          {/* Pickers A et B empilés */}
          <ModelSlot label="A" selected={modelA} onSelect={setModelA} allModels={allModels} loading={loadingA} />
          <ModelSlot label="B" selected={modelB} onSelect={setModelB} allModels={allModels} loading={loadingB} />

          {/* Prompt */}
          <div style={{ display:'flex', gap:8, alignItems:'flex-end' }}>
            <textarea value={prompt} onChange={e => setPrompt(e.target.value)} rows={3}
              placeholder="Ta question pour les deux modèles…"
              style={{ flex:1, padding:'10px 12px', border:`1.5px solid ${C.faint}`, borderRadius:8, fontSize:15, fontFamily:'Inter,sans-serif', resize:'none', outline:'none', background:C.paper }} />
            <button onClick={runCompare} disabled={!prompt.trim() || running}
              style={{ background: prompt.trim() && !running ? C.ink : C.faint, border:'none', borderRadius:8, color:'white', width:50, height:50, cursor: prompt.trim() && !running ? 'pointer' : 'not-allowed', fontSize:20, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              {running ? '⏳' : '↑'}
            </button>
          </div>

          {/* Réponses */}
          {(resA || resB || loadingA || loadingB) && [
            { model:modelA, res:resA, loading:loadingA, label:'A', color:C.blue },
            { model:modelB, res:resB, loading:loadingB, label:'B', color:C.orange },
          ].map(({ model, res, loading, label, color }) => {
            const info = allModels.find(m => m.id === model) || getModel(model);
            return (
              <div key={label} style={{ border:`1.5px solid #e8e5dc`, borderRadius:10, overflow:'hidden' }}>
                <div style={{ padding:'8px 12px', background:'#f9f7f2', borderBottom:`1px solid #f0ede4`, display:'flex', alignItems:'center', gap:8 }}>
                  <div style={{ width:20, height:20, borderRadius:'50%', background:color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:'white', flexShrink:0 }}>{label}</div>
                  <div style={{ minWidth:0, flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:C.ink, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{info?.name || model}</div>
                    <div style={{ fontSize:10, color:'#aaa' }}>{info?.provider || ''}{info?.inCost === 0 ? ' · Gratuit' : info?.inCost ? ` · $${info.inCost}/M` : ''}</div>
                  </div>
                  {loading && <span className="streaming-dot" style={{ width:7, height:7, flexShrink:0 }} />}
                </div>
                <div style={{ padding:'12px 14px', fontSize:14, lineHeight:1.6 }}>
                  {res ? <MsgContent content={res} /> : <span style={{ color:'#bbb', fontStyle:'italic' }}>{loading ? 'En cours…' : ''}</span>}
                </div>
              </div>
            );
          })}
          {/* espace sous le fold pour le dernier scroll */}
          <div style={{ height: 'env(safe-area-inset-bottom, 0px)' }} />
        </div>
      </div>
    );
  }

  // ── Rendu desktop : modal flottant ──────────────────────────────────────
  return (
    <>

// ─── Model Picker ─────────────────────────────────────────────
function ModelPicker() {
  const { state, dispatch } = useApp();
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('all');
  const [liveModels, setLiveModels] = useState(null); // null=curated, 'loading'=fetching, array=live
  const [liveError, setLiveError] = useState('');
  const [sortPrice, setSortPrice] = useState(null); // null | 'asc' | 'desc'
  const ref = useRef(null);

  useEffect(() => { if (state.showModelPicker && ref.current) ref.current.focus(); }, [state.showModelPicker]);
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') dispatch({ type:'CLOSE_MODEL_PICKER' }); };
    window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h);
  }, []);

  const isMobile = useIsMobile();

  if (!state.showModelPicker) return null;

  const tabId = state.tab;
  const ts = state.tabs[tabId];
  const current = ts?.convs.find(c => c.id === ts.activeId)?.model;
  const isLive = Array.isArray(liveModels);

  const fetchLive = async () => {
    setLiveModels('loading');
    setLiveError('');
    try {
      const resp = await fetch('https://openrouter.ai/api/v1/models');
      if (!resp.ok) throw new Error(`Erreur ${resp.status}`);
      const { data } = await resp.json();
      const mapped = data
        .filter(m => m.id && m.name)
        .sort((a, b) => a.name.localeCompare(b.name))
        .map(m => ({
          id: m.id,
          name: m.name,
          provider: m.id.split('/')[0],
          cat: 'live',
          inCost: parseFloat(m.pricing?.prompt || 0) * 1e6,
          outCost: parseFloat(m.pricing?.completion || 0) * 1e6,
          ctx: m.context_length ? (m.context_length >= 1000000 ? `${Math.round(m.context_length/1000000)}M` : `${Math.round(m.context_length/1000)}k`) : '?',
          vision: (m.architecture?.modality || '').includes('image'),
          note: m.description ? m.description.slice(0, 60) : '',
          speed: 2,
        }));
      mapped.forEach(m => { _modelCache[m.id] = m; });
      setLiveModels(mapped);
    } catch(e) {
      setLiveError(e.message || 'Erreur inconnue');
      setLiveModels(null);
    }
  };

  const sourceModels = isLive ? liveModels : MODELS;

  const filtered = sourceModels
    .filter(m => {
      if (!isLive && cat !== 'all' && m.cat !== cat) return false;
      if (search) {
        const q = search.toLowerCase();
        return m.name.toLowerCase().includes(q) || m.provider.toLowerCase().includes(q) || m.id.toLowerCase().includes(q);
      }
      return true;
    })
    .sort((a, b) => {
      if (!sortPrice) return 0;
      const pa = a.inCost ?? 0, pb = b.inCost ?? 0;
      return sortPrice === 'asc' ? pa - pb : pb - pa;
    });

  const grouped = MODEL_CATS.slice(1).reduce((acc, c) => {
    const items = filtered.filter(m => m.cat === c.id);
    if (items.length) acc[c.id] = { label:c.label, items };
    return acc;
  }, {});

  const select = id => dispatch({ type:'SET_MODEL', payload:{ tabId, model:id } });

  return (
    <>
      <div onClick={() => dispatch({ type:'CLOSE_MODEL_PICKER' })} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.35)', zIndex:100 }} />
      <div style={{ position:'fixed', top: isMobile ? '4%' : '10%', left:'50%', transform:'translateX(-50%)', width: isMobile ? 'calc(100vw - 16px)' : 620, maxHeight:'88vh', background:C.paper, border:`4px solid ${C.ink}`, borderRadius:'var(--pc-radius-3)', boxShadow:`var(--pc-shadow-lg)`, zIndex:101, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <div style={{ padding:'10px 14px', borderBottom:`1.5px solid #e8e5dc`, display:'flex', alignItems:'center', gap:8 }}>
          <div style={{ flex:1, display:'flex', alignItems:'center', gap:8, background:'#f7f4ec', border:`1.5px solid #e0ddd4`, borderRadius:8, padding:'7px 12px' }}>
            <span style={{ fontSize:14, color:'#aaa', flexShrink:0 }}>🔍</span>
            <input ref={ref} value={search} onChange={e => setSearch(e.target.value)}
              placeholder={isLive ? `Chercher parmi ${Array.isArray(liveModels) ? liveModels.length : '?'} modèles…` : 'Chercher… (haiku, gpt, gemini, mistral…)'}
              style={{ flex:1, border:'none', outline:'none', fontSize:14, background:'transparent', color:C.ink }} />
            {search && <button onClick={() => setSearch('')} style={{ background:'none', border:'none', cursor:'pointer', color:'#aaa', fontSize:16, padding:0, lineHeight:1 }}>×</button>}
          </div>
          <button
            onClick={() => setSortPrice(s => s === 'asc' ? 'desc' : s === 'desc' ? null : 'asc')}
            title="Trier par prix"
            style={{ flexShrink:0, background: sortPrice ? C.ink : '#f1eee5', border:`1.5px solid ${sortPrice ? C.ink : C.faint}`, borderRadius:8, padding:'6px 10px', cursor:'pointer', fontSize:13, color: sortPrice ? 'white' : '#888', display:'flex', alignItems:'center', gap:3 }}>
            💰{sortPrice === 'asc' ? ' ↑' : sortPrice === 'desc' ? ' ↓' : ''}
          </button>
          <span style={{ fontSize:11, color:'#bbb', background:'#f1eee5', padding:'3px 8px', borderRadius:4, flexShrink:0 }}>Esc</span>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:6, padding:'8px 14px', borderBottom:`1px solid #f0ede4`, overflowX:'auto', flexShrink:0 }}>
          {!isLive && MODEL_CATS.map(c => (
            <button key={c.id} onClick={() => setCat(c.id)}
              style={{ background: cat===c.id ? (c.color || C.ink) : '#f7f4ec', color: cat===c.id ? 'white' : '#555', border:`1px solid ${cat===c.id ? 'transparent' : '#e0ddd4'}`, borderRadius:20, padding:'3px 12px', fontSize:12, cursor:'pointer', whiteSpace:'nowrap' }}>
              {c.label}
            </button>
          ))}
          <div style={{ marginLeft:'auto', flexShrink:0, display:'flex', gap:6, alignItems:'center' }}>
            {isLive && (
              <button onClick={() => { setLiveModels(null); setCat('all'); }}
                style={{ background:'#f7f4ec', border:`1px solid #e0ddd4`, borderRadius:20, padding:'3px 12px', fontSize:12, cursor:'pointer', color:'#555', whiteSpace:'nowrap' }}>
                ← Sélection
              </button>
            )}
            <button onClick={isLive ? fetchLive : fetchLive}
              style={{ background: isLive ? C.teal : C.ink, border:'none', borderRadius:20, padding:'3px 14px', fontSize:12, cursor:'pointer', color:'white', whiteSpace:'nowrap', fontWeight:600, display:'flex', alignItems:'center', gap:5 }}>
              {liveModels === 'loading' ? '⏳ Chargement…' : isLive ? '🔄 Actualiser' : '🌐 Tous les modèles'}
            </button>
          </div>
        </div>

        {liveError && (
          <div style={{ padding:'8px 14px', background:'#fff5f5', borderBottom:`1px solid #fdd`, fontSize:12, color:C.red }}>{liveError}</div>
        )}

        <div style={{ overflow:'auto', flex:1 }}>
          {liveModels === 'loading' ? (
            <div style={{ padding:40, textAlign:'center', color:'#aaa' }}>
              <div style={{ fontSize:32, marginBottom:12 }}>⏳</div>
              <div>Récupération des modèles OpenRouter…</div>
            </div>
          ) : isLive ? (
            <>
              {filtered.length === 0 && <div style={{ padding:40, textAlign:'center', color:'#aaa' }}>Aucun modèle trouvé</div>}
              {filtered.map(m => <ModelRow key={m.id} m={m} current={current} onSelect={select} />)}
            </>
          ) : (
            <>
              {cat === 'all'
                ? Object.entries(grouped).map(([cid, { label, items }]) => (
                  <div key={cid}>
                    <div style={{ padding:'8px 14px 4px', fontSize:10, fontWeight:700, letterSpacing:1, textTransform:'uppercase', color: CAT_COLOR[cid] || '#aaa' }}>{label}</div>
                    {items.map(m => <ModelRow key={m.id} m={m} current={current} onSelect={select} />)}
                  </div>
                ))
                : filtered.map(m => <ModelRow key={m.id} m={m} current={current} onSelect={select} />)
              }
              {!filtered.length && <div style={{ padding:40, textAlign:'center', color:'#aaa' }}>Aucun modèle trouvé</div>}
            </>
          )}
        </div>

        <div style={{ padding:'8px 14px', borderTop:`1px solid #f0ede4`, display:'flex', justifyContent:'space-between', fontSize:11, color:'#bbb' }}>
          <span>{isLive ? `${filtered.length} / ${liveModels.length} modèles OpenRouter live` : `${MODELS.length} modèles sélectionnés`}</span>
          <span>Esc pour fermer</span>
        </div>
      </div>
    </>
  );
}

function ModelRow({ m, current, onSelect }) {
  const isCur = m.id === current;
  const col = CAT_COLOR[m.cat] || '#888';
  return (
    <button onClick={() => onSelect(m.id)}
      style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 14px', width:'100%', background: isCur ? '#fffaee' : 'transparent', border:'none', borderBottom:`1px solid #f7f4ec`, cursor:'pointer', textAlign:'left', gap:10 }}
      onMouseEnter={e => { if (!isCur) e.currentTarget.style.background='#f9f7f2'; }}
      onMouseLeave={e => { if (!isCur) e.currentTarget.style.background = isCur ? '#fffaee' : 'transparent'; }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
        <div style={{ width:20, height:20, borderRadius:'50%', background:col, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color:'white', fontWeight:700 }}>
          {isCur ? '✓' : m.provider[0]}
        </div>
        <div style={{ minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight: isCur ? 600 : 400, color:C.ink }}>{m.name}</div>
          <div style={{ fontSize:11, color:'#aaa', marginTop:1 }}>{m.provider} · {m.ctx}{m.note ? ` · ${m.note}` : ''}</div>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
        {m.vision && <span style={{ fontSize:10, background:'#e8f4ec', color:C.teal, padding:'1px 6px', borderRadius:10, border:`1px solid #c8e8d8` }}>vision</span>}
        <span style={{ fontSize:12, color:'#aaa' }}>{speedLabel(m.speed)}</span>
        <span style={{ fontSize:12, fontWeight:600, color:'#555', minWidth:50, textAlign:'right' }}>{m.inCost ? `$${m.inCost}/M` : 'Gratuit'}</span>
      </div>
    </button>
  );
}

// ─── Settings ─────────────────────────────────────────────────
function Settings() {
  const { state, dispatch } = useApp();
  const [s, setS] = useState(() => ({ ...state.settings }));
  const [showKey, setShowKey] = useState(false);
  const [saved, setSaved] = useState(false);
  const [fbCfgText, setFbCfgText] = useState(() => {
    const c = loadFbConfig(); return c ? JSON.stringify(c, null, 2) : '';
  });
  const { models: liveModels, status: liveStatus } = useLiveModels();
  const [fbStatus, setFbStatus] = useState(() => CLOUD.enabled ? 'ok' : 'off');
  const [fbError, setFbError] = useState('');
  const [showFbCfg, setShowFbCfg] = useState(false);

  useEffect(() => { if (state.showSettings) setS({ ...state.settings }); }, [state.showSettings]);
  const isMobile = useIsMobile();

  if (!state.showSettings) return null;

  const save = () => {
    dispatch({ type:'SET_SETTINGS', payload:s });
    saveSettings(s); // Sauvegarde immédiate (pas uniquement via useEffect)
    // Init Firebase si config renseignée
    if (fbCfgText.trim()) {
      const cfg = extractJsonObj(fbCfgText);
      if (!cfg || !cfg.projectId) {
        setFbStatus('error');
        setFbError('Impossible de lire la config — colle le bloc firebaseConfig complet');

        saveFbConfig(cfg);
        const result = initFirebase(cfg);
        if (result === true) { setFbStatus('ok'); setFbError(''); }

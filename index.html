/* ── DESIGN SYSTEM — Punk Comics Fluo (Mitchell) ── */
:root {
  --pc-color-orange:  #FF6B00;
  --pc-color-red:     #D83025;
  --pc-color-cyan:    #00F0FF;
  --pc-color-yellow:  #E5FF00;

  --pc-color-paper:   #F4F0EB;
  --pc-color-fuchsia: #FF0099;
  --pc-font-display:  'Permanent Marker', 'Bangers', cursive;
  --pc-font-body:     'Share Tech Mono', 'Courier New', monospace;
  --pc-border:        3px solid #111111;
  --pc-border-thick:  4px solid #111111;
  --pc-shadow:        5px 5px 0px #111111;
  --pc-shadow-lg:     8px 8px 0px #111111;
  --pc-shadow-hover:  10px 10px 0px #111111;
  --pc-radius-1:      255px 15px 225px 15px / 15px 225px 15px 255px;
  --pc-radius-2:      15px 225px 15px 255px / 255px 15px 225px 15px;
  --pc-radius-3:      8px 120px 8px 80px / 80px 8px 120px 8px;
}
*, *::before, *::after { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body { font-family: var(--pc-font-body); background: var(--pc-color-paper); color: var(--pc-color-black); -webkit-font-smoothing: antialiased; font-size: 16px; }
* { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.25) transparent; }
*::-webkit-scrollbar { width: 7px; height: 7px; }
*::-webkit-scrollbar-thumb { background: rgba(0,0,0,.3); border-radius: 3px; }
button { font-family: inherit; box-sizing: border-box; }
textarea { display: block; }
@keyframes pulse    { 0%,100% { opacity:1 } 50% { opacity:.3 } }
@keyframes fadeIn   { from { opacity:0; transform:translateY(4px) } to { opacity:1; transform:translateY(0) } }
@keyframes mic-ring { 0%,100% { box-shadow:0 0 0 0 rgba(227,90,79,.5); } 60% { box-shadow:0 0 0 8px rgba(227,90,79,0); } }
@keyframes speaking-bar { 0%,100% { transform:scaleY(.3) } 50% { transform:scaleY(1) } }
.streaming-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#e35a4f; animation:pulse 1s infinite; }
.mic-active    { animation:mic-ring .9s ease-out infinite; }
.speaking-wave { display:inline-flex; align-items:center; gap:2px; }

.safe-top    { padding-top:    env(safe-area-inset-top, 0px); }

/* Prevent iOS input zoom (font-size must be ≥ 16px) */
@media (max-width: 700px) {
  textarea, input, select { font-size: 16px !important; }
  /* Apple Human Interface Guidelines: minimum tap target 44×44px */
  button { min-height: 44px; min-width: 44px; }

/* Scroll iOS fix */

<script>
// ══════════════════════════════════════════════════════════════
// CLOUD MODULE — Firebase Firestore + Google Drive
// ══════════════════════════════════════════════════════════════
const PFX_LS = 'ricard_ai_';
const _lsGet = (k, fb=null) => { try { const v=localStorage.getItem(PFX_LS+k); return v?JSON.parse(v):fb; } catch { return fb; } };
const _lsSet = (k, v) => { try { localStorage.setItem(PFX_LS+k, JSON.stringify(v)); } catch {} };

// ══════════════════════════════════════════════════════════════
// ⚙️  CONFIGURATION DÉVELOPPEUR — à remplir une fois, re-déployer
// Tous les appareils de la famille se configurent automatiquement.
// Laisser null → configuration manuelle via Réglages.
// ══════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = null;
// Exemple : { apiKey:"AIzaSy...", authDomain:"xxx.firebaseapp.com",
//             projectId:"xxx", storageBucket:"xxx.appspot.com",
//             messagingSenderId:"123456", appId:"1:123:web:abc" }

const FAMILY_ID_HARDCODED = null;
// Exemple : "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
// Génère un UUID sur https://www.uuidgenerator.net/

// ── Family ID (partagé entre appareils) ───────────────────────
function getFamilyId() {
  if (FAMILY_ID_HARDCODED) {
    localStorage.setItem('ricard_familyId', FAMILY_ID_HARDCODED);
    return FAMILY_ID_HARDCODED;
  }
  let id = localStorage.getItem('ricard_familyId');
  if (!id) { id = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16)); localStorage.setItem('ricard_familyId', id); }
  return id;
}

// ── Firebase state ─────────────────────────────────────────────
const CLOUD = { db: null, enabled: false };
const FB_APP_NAME = 'ricard'; // app nommée → évite le conflit "[DEFAULT] already exists"

function loadFbConfig()   { return _lsGet('fb_config', null); }
function saveFbConfig(c)  { _lsSet('fb_config', c); }
function loadGClientId()  { return _lsGet('g_client_id', ''); }
function saveGClientId(v) { _lsSet('g_client_id', v); }

// Extrait un objet depuis du JSON ou du JS (clés non quotées, commentaires, etc.)
function extractJsonObj(text) {
  const t = text.trim();
  // 1. JSON pur
  try { return JSON.parse(t); } catch {}
  // 2. Extraire le bloc {...}
  const m = t.match(/\{[\s\S]*\}/);
  if (!m) return null;
  let s = m[0];
  // 3. Nettoyer : supprimer commentaires // et /* */
  s = s.replace(/\/\/[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
  // 4. Quoter les clés JS non quotées (apiKey: → "apiKey":)
  s = s.replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g, '$1"$2"$3');
  // 5. Supprimer les virgules trailing (,} ou ,])
  s = s.replace(/,(\s*[}\]])/g, '$1');
  try { return JSON.parse(s); } catch {}
  // 6. Dernier recours : évaluation JS sécurisée
  try { return Function('"use strict";return(' + m[0] + ')')(); } catch {}
  return null;
}

function initFirebase(cfg) {
  if (typeof firebase === 'undefined') return 'SDK Firebase non chargé — recharge la page';
  try {
    if (!cfg || !cfg.projectId) return 'projectId manquant dans la config';
    // Cherche une app nommée 'ricard' déjà existante
    let app = (firebase.apps || []).find(a => a.name === FB_APP_NAME);
    if (app) {
      if (app.options.projectId === cfg.projectId) {
        CLOUD.db = app.firestore();
        CLOUD.enabled = true;
        console.log('[Firebase] ✅ réutilisé', cfg.projectId);
        return true;
      }
      app.delete().then(() => initFirebase(cfg)).catch(() => {});
      return 'Changement de projet — réessaie dans 2 secondes';
    }
    app = firebase.initializeApp(cfg, FB_APP_NAME);
    CLOUD.db = app.firestore();
    CLOUD.enabled = true;
    console.log('[Firebase] ✅ initialisé', cfg.projectId);
    return true;
  } catch(e) {
    console.warn('[Firebase] init error:', e.message);
    CLOUD.enabled = false;
    return e.message;
  }
}

// Auto-init au démarrage (FIREBASE_CONFIG hardcodé > config sauvegardée)
(function() {
  const cfg = FIREBASE_CONFIG || loadFbConfig();
  if (cfg) {
    initFirebase(cfg);
    if (FIREBASE_CONFIG) saveFbConfig(FIREBASE_CONFIG); // persiste pour les Réglages
  }
})();

// ── Firestore save / load ─────────────────────────────────────
const _saveTimers = {};
function cloudSaveLater(pid, tab, convs) {
  const k = pid+'_'+tab;
  clearTimeout(_saveTimers[k]);
  _saveTimers[k] = setTimeout(() => cloudSave(pid, tab, convs), 3000);
}
async function cloudSave(pid, tab, convs) {
  if (!CLOUD.enabled) return;
  try {
    await CLOUD.db.collection('ricard').doc(getFamilyId()+'_'+pid+'_'+tab).set({
      convs: JSON.stringify(convs.slice(-30)),
      updatedAt: new Date().toISOString(),
    });
  } catch(e) { console.warn('[Firebase] save:', e.message); }
}
// ─── Sync clé API via Firebase ───────────────────────────────
async function cloudSaveApiKey(apiKey) {
  if (!CLOUD.enabled || !apiKey) return;
  try {
    await CLOUD.db.collection('ricard_config').doc(getFamilyId()).set(
      { apiKey, updatedAt: new Date().toISOString() },
      { merge: true }
    );
    console.log('[Firebase] 🔑 clé API sauvegardée');
  } catch(e) { console.warn('[Firebase] apiKey save:', e.message); }
}

function cloudWatchApiKey(callback) {
  if (!CLOUD.enabled) return () => {};
  try {
    const unsub = CLOUD.db
      .collection('ricard_config')
      .doc(getFamilyId())
      .onSnapshot(doc => {
        if (doc.exists) {
          const key = doc.data()?.apiKey;
          if (key) callback(key);
        }
      }, err => console.warn('[Firebase] apiKey watch:', err.message));
    return unsub;
  } catch(e) {
    console.warn('[Firebase] cloudWatchApiKey:', e.message);
    return () => {};
  }
}

async function cloudLoadAll(pid) {
  if (!CLOUD.enabled) return null;
  const tabs = ['chat','code','design','zya','zelie'];
  const result = {};
  for (const tab of tabs) {
    try {
      const doc = await CLOUD.db.collection('ricard').doc(getFamilyId()+'_'+pid+'_'+tab).get();
      if (doc.exists) {
        const convs = JSON.parse(doc.data().convs || 'null');
        if (convs?.length) result[tab] = convs;
      }
    } catch(e) { console.warn('[Firebase] load:', e.message); }
  }
  return Object.keys(result).length ? result : null;
}

// ── Google Drive backup / restore ─────────────────────────────
// ── Export / Import JSON (pas besoin de Drive API) ───────────
function backupToFile() {
  const data = {
    version: 2,
    exportDate: new Date().toISOString(),
    familyId: getFamilyId(),
    profiles: {}
  };
  ['papa','maman','zya','zelie'].forEach(pid => {
    data.profiles[pid] = {};
    ['chat','code','design','zya','zelie'].forEach(tab => {
      const convs = _lsGet('convs_'+pid+'_'+tab, []);
      if (convs.length) data.profiles[pid][tab] = convs;
    });
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ricard-ai-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function restoreFromFile(onDone) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data?.profiles) { alert('❌ Fichier invalide.'); return; }
        Object.entries(data.profiles).forEach(([pid, tabs]) => {
          Object.entries(tabs).forEach(([tab, convs]) => {
            if (Array.isArray(convs)) _lsSet('convs_'+pid+'_'+tab, convs);
          });
        });
        if (data.familyId) localStorage.setItem('ricard_familyId', data.familyId);
        alert('✅ Restauré depuis ' + file.name + '\nL\'app va se recharger.');
        onDone?.();
        setTimeout(() => window.location.reload(), 500);
      } catch(e) { alert('❌ Fichier invalide : ' + e.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}
</script>

  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;

}

// ─── Multimodal API message builder ──────────────────────────
function buildMsgContent(msg) {
  if (!msg.attachments?.length) return msg.content || '';
  const parts = [];
  if (msg.content?.trim()) parts.push({ type:'text', text: msg.content });
  for (const att of msg.attachments) {
    if (att.type === 'image') {
      parts.push({ type:'image_url', image_url:{ url:`data:${att.mimeType};base64,${att.data}` } });
    }
  }
  return parts.length ? parts : (msg.content || '');
}

const _modelCache = {};
function getModel(id) {
  return MODELS.find(m => m.id === id) || _modelCache[id] || (id ? { id, name: id.split('/').pop(), provider: id.split('/')[0], inCost: 0, outCost: 0, ctx:'?', speed:2 } : MODELS[2]);
}

// ─── Cache global des modèles OpenRouter live ─────────────────
// Partagé entre CompareModal, Settings et ModelPicker
let _liveModelsCache = null;   // null | 'loading' | Model[]
let _liveModelsCbs  = [];      // callbacks en attente

async function fetchAllModels() {
  if (Array.isArray(_liveModelsCache)) return _liveModelsCache;
  if (_liveModelsCache === 'loading') {
    return new Promise(res => _liveModelsCbs.push(res));
  }
  _liveModelsCache = 'loading';
  try {
    const r = await fetch('https://openrouter.ai/api/v1/models');
    const { data } = await r.json();
    const mapped = data
      .filter(m => m.id && m.name)
      .sort((a, b) => {
        const pa = parseFloat(a.pricing?.prompt || 0) * 1e6;
        const pb = parseFloat(b.pricing?.prompt || 0) * 1e6;
        return pa - pb; // gratuits en premier
      })
      .map(m => ({
        id: m.id,
        name: m.name,
        provider: m.id.split('/')[0],
        cat: 'live',
        inCost: parseFloat(m.pricing?.prompt || 0) * 1e6,
        outCost: parseFloat(m.pricing?.completion || 0) * 1e6,
        ctx: m.context_length
          ? m.context_length >= 1e6 ? `${Math.round(m.context_length/1e6)}M`
          : `${Math.round(m.context_length/1000)}k`
          : '?',
        vision: (m.architecture?.modality || '').split('->')[0]?.includes('image') ?? false,
        imageGen: ((m.architecture?.modality || '').split('->')[1] || '').toLowerCase().includes('image'),
        speed: 2,
      }));
    mapped.forEach(m => { _modelCache[m.id] = m; });
    _liveModelsCache = mapped;
    _liveModelsCbs.forEach(cb => cb(mapped));
    _liveModelsCbs = [];
    return mapped;
  } catch {
    _liveModelsCache = null; // reset pour retry
    _liveModelsCbs.forEach(cb => cb(null));
    _liveModelsCbs = [];
    return null;
  }
}

// Hook React pour accéder aux modèles live (avec fallback local)
function useLiveModels() {
  const [models, setModels] = useState(() =>
    Array.isArray(_liveModelsCache) ? _liveModelsCache : MODELS
  );
  const [status, setStatus] = useState(() =>
    Array.isArray(_liveModelsCache) ? 'done' : 'idle'
  );
  useEffect(() => {
    if (Array.isArray(_liveModelsCache)) { setModels(_liveModelsCache); setStatus('done'); return; }
    setStatus('loading');
    fetchAllModels().then(m => {
      if (m) { setModels(m); setStatus('done'); }
      else setStatus('error');
    });
  }, []);
  return { models, status };
}

// ─── Storage with optional LZ-string compression ─────────────
const PFX = 'ricard_ai_';
function lsGet(key, fallback = null) {
  try {
    const v = localStorage.getItem(PFX + key);
    if (!v) return fallback;
    if (v.startsWith('lz:') && window.LZString) {
      const dec = window.LZString.decompressFromUTF16(v.slice(3));
      return dec ? JSON.parse(dec) : fallback;
    }
    return JSON.parse(v);
  } catch { return fallback; }
}
function lsSet(key, val) {
  try {
    const str = JSON.stringify(val);
    let stored = str;
    if (str.length > 500 && window.LZString) {
      stored = 'lz:' + window.LZString.compressToUTF16(str);
    }
    localStorage.setItem(PFX + key, stored);
  } catch(e) {
    // Quota dépassé (fréquent sur iOS avec conversations + images)
    // → purger les anciennes conversations pour libérer de la place
    if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
      try {
        // Supprimer les conversations les plus anciennes de chaque tab/profil
        const toDelete = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k && k.startsWith(PFX + 'convs_')) toDelete.push(k);
        }
        // Supprimer la moitié des conversations (les plus anciennes en premier)
        toDelete.slice(0, Math.ceil(toDelete.length / 2)).forEach(k => localStorage.removeItem(k));
        // Réessayer
        localStorage.setItem(PFX + key, JSON.stringify(val));
      } catch {}
    }
  }
}

// ─── OpenRouter streaming ─────────────────────────────────────
// Extrait le texte d'un contenu OpenRouter (string, tableau multi-part, ou null)
function extractContent(raw) {
  if (!raw && raw !== 0) return '';
  if (typeof raw === 'string') return raw;
  if (Array.isArray(raw)) {
    return raw.filter(p => p?.type === 'text').map(p => p.text || '').join('');
  }
  return String(raw);
}

async function streamChat({ apiKey, model, messages, onChunk, onDone, onError, signal }) {
  // Safari iOS et certains navigateurs mobiles ne supportent pas le SSE
  // → toujours JSON (non-streaming) sur mobile
  const isMobileUA = /iPad|iPhone|iPod|Android|Mobile|CriOS|FxiOS/i.test(navigator.userAgent)
                  || window.innerWidth < 768;

  let resp;
  try {
    resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.origin,
        'X-Title': 'Ricard AI',
      },
      body: JSON.stringify({ model, messages, stream: !isMobileUA }),
      signal,
    });
  } catch(err) {
    if (err.name === 'AbortError') return;
    onError?.('Connexion impossible. Vérifiez votre clé API.');
    return;
  }

  if (!resp.ok) {
    let msg = `Erreur ${resp.status}`;
    try { const e = await resp.json(); msg = e.error?.message || msg; } catch {}
    onError?.(msg); return;
  }

  // ── Mode mobile : réponse JSON directe ───────────────────────
  if (isMobileUA) {
    let rawText;
    try { rawText = await resp.text(); } catch(e) { onError?.('Lecture impossible : ' + e.message); return; }

    // Parfois le serveur envoie quand même du SSE malgré stream:false → détecter et parser
    if (rawText.trimStart().startsWith('data:')) {
      // Parsing SSE de secours
      let full = '', inTk = 0, outTk = 0;
      for (const line of rawText.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') break;
        try {
          const j = JSON.parse(d);
          const delta = j.choices?.[0]?.delta?.content ?? '';
          if (delta) full += delta;
          if (j.usage) { inTk = j.usage.prompt_tokens || 0; outTk = j.usage.completion_tokens || 0; }
        } catch {}
      }
      if (!full) { onError?.('Réponse vide du modèle. Essaie un autre modèle.'); return; }
      onDone?.({ text: full, inputTokens: inTk, outputTokens: outTk });
      return;
    }

    // JSON standard
    try {
      const data = JSON.parse(rawText);
      const text = extractContent(data.choices?.[0]?.message?.content);
      const inTk  = data.usage?.prompt_tokens || 0;
      const outTk = data.usage?.completion_tokens || 0;
      // Contenu vide malgré des tokens : modèle en erreur silencieuse
      if (!text && (inTk > 0 || outTk > 0)) {
        const reason = data.choices?.[0]?.finish_reason || 'unknown';
        onError?.(`Réponse vide (finish_reason: ${reason}). Essaie un autre modèle ou reformule ta question.`);
        return;
      }
      if (!text) { onError?.('Réponse vide du modèle.'); return; }
      onDone?.({ text, inputTokens: inTk, outputTokens: outTk });
    } catch(e) {
      onError?.('Impossible de lire la réponse : ' + e.message);
    }
    return;
  }

  // ── Mode desktop : streaming SSE ─────────────────────────────
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let full = '', inTk = 0, outTk = 0, buf = '';
  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() ?? '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') { onDone?.({ text: full, inputTokens: inTk, outputTokens: outTk }); return; }
        try {
          const j = JSON.parse(d);
          const delta = j.choices?.[0]?.delta?.content ?? '';
          if (delta) { full += delta; onChunk?.(delta, full); }
          if (j.usage) { inTk = j.usage.prompt_tokens || 0; outTk = j.usage.completion_tokens || 0; }
        } catch {}
      }
    }
  } catch(err) {
    if (err.name === 'AbortError') return;
    onError?.('Connexion interrompue.'); return;
  }
  onDone?.({ text: full, inputTokens: inTk, outputTokens: outTk });
}

// ─── Voice utilities ─────────────────────────────────────────
function stripMarkdownForSpeech(text) {
  return text
    .replace(/```[\s\S]*?```/g, ' ') // code blocks → silence
    .replace(/`[^`]+`/g, '')          // inline code
    .replace(/#{1,6} /g, '')           // headings
    .replace(/\*\*(.+?)\*\*/g, '$1')  // bold
    .replace(/\*(.+?)\*/g, '$1')      // italic
    .replace(/^[-•*] /gm, '')          // bullets
    .replace(/^\d+\. /gm, '')          // numbered lists
    .replace(/\[(.+?)\]\(.+?\)/g, '$1')// links
    .replace(/\n{2,}/g, '. ')         // double newlines → pause
    .replace(/\n/g, ' ')              // single newlines
    .trim();
}

let _ttsActive = false;
function textToSpeech(text, onEnd) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const clean = stripMarkdownForSpeech(text);
  if (!clean) { onEnd?.(); return; }
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'fr-FR';
  utter.rate = 1.05;
  utter.pitch = 1;
  const trySpeak = () => {
    const voices = window.speechSynthesis.getVoices();
    const frVoice = voices.find(v => v.lang.startsWith('fr') && v.localService)
                 || voices.find(v => v.lang.startsWith('fr'));
    if (frVoice) utter.voice = frVoice;
    utter.onend = () => { _ttsActive = false; onEnd?.(); };
    utter.onerror = () => { _ttsActive = false; onEnd?.(); };
    _ttsActive = true;
    window.speechSynthesis.speak(utter);
  };
  if (window.speechSynthesis.getVoices().length) {
    trySpeak();
  } else {
    // Voices not yet loaded (frequent on first call)
    window.speechSynthesis.addEventListener('voiceschanged', trySpeak, { once: true });
  }
}
function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  _ttsActive = false;
}

function useVoiceInput(onResult) {
  const [listening, setListening] = useState(false);
  const [interimText, setInterimText] = useState('');
  const recRef = useRef(null);
  // Garde la dernière version du callback sans recréer l'instance SR
  const onResultRef = useRef(onResult);
  useEffect(() => { onResultRef.current = onResult; }, [onResult]);

  const SR = typeof window !== 'undefined' && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const supported = !!SR;

  const stop = useCallback(() => {
    if (recRef.current) {
      try { recRef.current.abort(); } catch {} // abort() = stop immédiat sans onend
      recRef.current = null;
    }
    setListening(false);
    setInterimText('');
  }, []);

  const start = useCallback(() => {
    if (!SR) return;
    // Nettoyer une éventuelle instance précédente sans déclencher ses callbacks
    if (recRef.current) {
      try { recRef.current.abort(); } catch {}
      recRef.current = null;
    }
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.continuous = true;      // ← garde l'écoute ouverte → plus de re-demande de permission
    rec.interimResults = true;
    rec.maxAlternatives = 1;

    rec.onstart  = () => setListening(true);
    rec.onend    = () => {
      // onend ne se déclenche qu'après abort() ou erreur réseau
      recRef.current = null;
      setListening(false);
      setInterimText('');
    };
    rec.onerror  = (e) => {
      if (e.error === 'aborted') return; // abort volontaire → ignorer
      console.warn('[Voice] error:', e.error);
      recRef.current = null;
      setListening(false);
      setInterimText('');
    };
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          if (t.trim()) onResultRef.current(t.trim());
        } else {
          interim += t;
        }
      }
      setInterimText(interim);
    };

    recRef.current = rec;
    try { rec.start(); } catch(err) {
      console.warn('[Voice] start error:', err);
      recRef.current = null;
      setListening(false);
    }
  }, [SR]);

  const toggle = useCallback(() => {
    if (listening) stop(); else start();
  }, [listening, start, stop]);

  // Nettoyage au démontage
  useEffect(() => () => { try { recRef.current?.abort(); } catch {} }, []);

  return { listening, supported, toggle, interimText };
}

  { id:'openai/dall-e-3',                          name:'DALL·E 3',       by:'OpenAI',       size:'1024×1024' },
  { id:'openai/dall-e-2',                          name:'DALL·E 2',       by:'OpenAI',       size:'1024×1024' },
  { id:'black-forest-labs/flux-1.1-pro',           name:'Flux 1.1 Pro',   by:'Black Forest', size:'1024×1024' },
  { id:'black-forest-labs/flux-schnell',           name:'Flux Schnell',   by:'Black Forest', size:'1024×1024' },
  { id:'stabilityai/stable-diffusion-xl-base-1.0', name:'SDXL',           by:'Stability AI', size:'1024×1024' },
];

async function generateImage({ apiKey, model, prompt, onDone, onError }) {
  try {
    const res = await fetch('https://openrouter.ai/api/v1/images/generations', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${apiKey}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': location.origin,
        'X-Title': 'Ricard AI',
      },
      body: JSON.stringify({
        model: model || 'openai/dall-e-3',
        prompt,
        n: 1,
        size: '1024x1024',
      }),
    });
    if (!res.ok) {
      let msg = `Erreur ${res.status}`;
      try { const e = await res.json(); msg = e.error?.message || msg; } catch {}
      onError?.(msg); return;
    }
    const data = await res.json();
    const url     = data.data?.[0]?.url;
    const revised = data.data?.[0]?.revised_prompt;
    if (!url) { onError?.('Aucune image reçue — essaie un autre modèle'); return; }
    onDone?.({ url, revised });
  } catch(err) {
    if (err.name === 'AbortError') return;
    onError?.(err.message || 'Erreur réseau');
  }
}

// ─── Helpers gamification ────────────────────────────────────
const RANKS = [
  { min:0,   label:'🌱 Graine',    color:'#86efac' },
  { min:10,  label:'⚡ Étincelle', color:'#fbbf24' },
  { min:50,  label:'🌟 Nova',      color:'#a78bfa' },
  { min:150, label:'🔥 Soleil',    color:'#f97316' },
  { min:400, label:'🚀 Maître',    color:'#06b6d4' },
];
function getRank(xp) {
  return [...RANKS].reverse().find(r => xp >= r.min) || RANKS[0];
}
function getXP(pid) {
  return loadCostLog().filter(e => e.profile === pid).length;
}
function getStreak(pid) {
  return parseInt(localStorage.getItem(`ricard_streak_${pid}_count`) || '0', 10);
}
function updateStreak(pid) {
  const base = `ricard_streak_${pid}`;
  const lastDay = localStorage.getItem(`${base}_lastDay`) || '';
  const count   = parseInt(localStorage.getItem(`${base}_count`) || '0', 10);
  const today   = dateKey();
  if (lastDay === today) return count; // déjà mis à jour aujourd'hui
  const d = new Date(); d.setDate(d.getDate() - 1);
  const yesterday = `${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
  const newCount = (lastDay === yesterday || !lastDay) ? count + 1 : 1;
  localStorage.setItem(`${base}_lastDay`, today);
  localStorage.setItem(`${base}_count`,   String(newCount));
  return newCount;
}

// ─── Helpers contrôle parental ───────────────────────────────
function isInAccessHours(hours) {
  if (!hours?.enabled) return true;
  const now = new Date();
  const [sh, sm] = (hours.start || '00:00').split(':').map(Number);
  const [eh, em] = (hours.end   || '23:59').split(':').map(Number);
  const cur = now.getHours() * 60 + now.getMinutes();
  return cur >= sh * 60 + sm && cur < eh * 60 + em;
}

function getWelcomeMsg(pid) {
  const h = new Date().getHours();
  const salut = h < 6 ? '🌙 Bonne nuit' : h < 12 ? '☀️ Bonjour' : h < 18 ? '👋 Bon après-midi' : '🌇 Bonne soirée';
  const bank = {
    papa:  [`${salut} Papa ! L'IA est prête pour toi.`, `${salut} Papa 💪 Qu'est-ce qu'on attaque ?`],
    maman: [`${salut} Maman ! À toi de jouer ✨`, `${salut} Maman ! Quelle belle idée auras-tu aujourd'hui ?`],
    zya:   [`${salut} Zya ! Prête à explorer ? 🚀`, `${salut} Zya ! Qu'est-ce qu'on apprend aujourd'hui ? 🌟`],
    zelie: [`${salut} Zélie ! C'est l'heure de créer 🌸`, `${salut} Zélie ! Qu'est-ce qui te plaît aujourd'hui ? 🎨`],
  };
  const list = bank[pid] || [`${salut} !`];
  return list[Math.floor(Math.random() * list.length)];
}

// ─── App State ───────────────────────────────────────────────
const TABS = ['chat','code','design','zya','zelie'];
function newConv(tabId, settings) {
  const dm = settings?.defaultModels ?? DEFAULT_MODELS_PER_TAB;
  return {
    id: uuid(), tabId,
    title: 'Nouvelle conversation',
    messages: [],
    model: dm[tabId] ?? DEFAULT_MODEL,
    createdAt: Date.now(),
    totalIn: 0, totalOut: 0, totalCost: 0,
    pinned: false,
  };
}
function initTab(pid, tabId, settings) {
  const convs = loadConvs(pid, tabId);
  const active = convs[convs.length - 1] || newConv(tabId, settings);
  return { convs: convs.length ? convs : [active], activeId: active.id };
}
function buildState(pid) {
  try { updateStreak(pid); } catch(e) { console.warn('[Streak] localStorage error:', e); } // Met à jour le streak dès la connexion
  const settings = loadSettings();
  const tabs = {};
  TABS.forEach(t => { tabs[t] = initTab(pid, t, settings); });
  return {
    profile: pid, tab: 'chat', tabs,
    settings,
    monthCost: loadMonthCost(pid),
    streaming: false,
    showModelPicker: false, showSettings: false, showDashboard: false,
    artifact: null, showArtifact: false,
    showSearch: false, showCompare: false,
    toasts: [],
    welcome: pid,  // déclenche le message de bienvenue
  };
}

function reducer(state, action) {
  switch (action.type) {
    case 'SET_PROFILE':
      if (!action.payload) return { ...state, profile: null, tab: 'chat', showPinEntry: false, pendingProfile: null };
      return buildState(action.payload);
    case 'SET_TAB': return { ...state, tab: action.payload, showModelPicker: false };
    case 'SET_SETTINGS': return { ...state, settings: action.payload };
    case 'SET_STREAMING': return { ...state, streaming: action.payload };
    case 'TOGGLE_MODEL_PICKER': return { ...state, showModelPicker: !state.showModelPicker };
    case 'CLOSE_MODEL_PICKER': return { ...state, showModelPicker: false };
    case 'TOGGLE_SETTINGS': return { ...state, showSettings: !state.showSettings, showDashboard: false };
    case 'TOGGLE_DASHBOARD': return { ...state, showDashboard: !state.showDashboard, showSettings: false };
    case 'CLOSE_OVERLAYS': return { ...state, showSettings: false, showDashboard: false, showModelPicker: false, showSearch: false, showCompare: false };
    case 'TOGGLE_SEARCH': return { ...state, showSearch: !state.showSearch };
    case 'TOGGLE_COMPARE': return { ...state, showCompare: !state.showCompare };
    case 'TOGGLE_PIN': {
      const { tabId, convId } = action.payload;
      const t = state.tabs[tabId];
      return { ...state, tabs: { ...state.tabs, [tabId]: { ...t, convs: t.convs.map(c => c.id === convId ? { ...c, pinned: !c.pinned } : c) } } };
    }
    case 'SHOW_PIN_ENTRY': return { ...state, showPinEntry: true, pendingProfile: action.payload };
    case 'HIDE_PIN_ENTRY': return { ...state, showPinEntry: false, pendingProfile: null };
    case 'CONFIRM_PROFILE': return { ...buildState(action.payload), showPinEntry: false, pendingProfile: null };
    case 'SHOW_FAMILY_GATE': return { ...state, showFamilyGate: true };
    case 'HIDE_FAMILY_GATE': return { ...state, showFamilyGate: false };
    case 'SHOW_TOAST': {
      const t = { id: Date.now() + Math.random(), ...action.payload };
      return { ...state, toasts: [...(state.toasts||[]), t] };
    }
    case 'DISMISS_TOAST': return { ...state, toasts: (state.toasts||[]).filter(t => t.id !== action.payload) };
    case 'DISMISS_WELCOME': return { ...state, welcome: null };
    case 'OPEN_ARTIFACT': return { ...state, artifact: action.payload, showArtifact: true };
    case 'CLOSE_ARTIFACT': return { ...state, showArtifact: false };
    case 'TOGGLE_ARTIFACT': return { ...state, showArtifact: !state.showArtifact };
    case 'SET_MONTH_COST': return { ...state, monthCost: action.payload };
    case 'MERGE_CLOUD_TABS': {
      // Fusionne les conversations Firebase dans le state (Firebase = source de vérité)
      const merged = { ...state.tabs };
      Object.entries(action.payload).forEach(([tab, convs]) => {
        merged[tab] = { convs, activeId: convs[convs.length-1]?.id || null };
      });
      return { ...state, tabs: merged };
    }
    case 'NEW_CONV': {
      const { tabId } = action.payload;
      const c = newConv(tabId, state.settings);
      const t = state.tabs[tabId];
      return { ...state, tabs: { ...state.tabs, [tabId]: { convs: [...t.convs, c], activeId: c.id } } };
    }
    case 'SELECT_CONV': {
      const { tabId, convId } = action.payload;
      return { ...state, tabs: { ...state.tabs, [tabId]: { ...state.tabs[tabId], activeId: convId } } };
    }
    case 'DELETE_CONV': {
      const { tabId, convId } = action.payload;
      const t = state.tabs[tabId];
      const convs = t.convs.filter(c => c.id !== convId);
      const fallback = convs[convs.length - 1];
      const activeId = t.activeId === convId ? (fallback?.id || null) : t.activeId;
      return { ...state, tabs: { ...state.tabs, [tabId]: { convs, activeId } } };
    }
    case 'SET_MODEL': {
      const { tabId, model } = action.payload;
      const t = state.tabs[tabId];
      return {
        ...state,
        showModelPicker: false,
        tabs: { ...state.tabs, [tabId]: { ...t, convs: t.convs.map(c => c.id === t.activeId ? { ...c, model } : c) } },
      };
    }
    case 'ADD_MSG': {
      const { tabId, msg } = action.payload;
      const t = state.tabs[tabId];
      return {
        ...state,
        tabs: {
          ...state.tabs,
          [tabId]: {
            ...t,
            convs: t.convs.map(c => {
              if (c.id !== t.activeId) return c;
              const messages = [...c.messages, msg];
              const title = c.title === 'Nouvelle conversation' && c.messages.length === 0
                ? (msg.content ? msg.content.slice(0, 42) + (msg.content.length > 42 ? '…' : '') : (msg.attachments?.[0]?.name || 'Conversation'))
                : c.title;
              return { ...c, messages, title };
            }),
          },
        },
      };
    }
    case 'UPDATE_ASSISTANT': {
      const { tabId, content, inTk, outTk, done } = action.payload;
      const t = state.tabs[tabId];
      return {
        ...state,
        tabs: {
          ...state.tabs,
          [tabId]: {
            ...t,
            convs: t.convs.map(c => {
              if (c.id !== t.activeId) return c;
              const messages = c.messages.map((m, i) => {
                if (i !== c.messages.length - 1 || m.role !== 'assistant') return m;
                return { ...m, content, inTk, outTk, done };
              });
              const totalIn  = done ? c.totalIn  + inTk  : c.totalIn;
              const totalOut = done ? c.totalOut + outTk  : c.totalOut;
              const totalCost = done ? c.totalCost + estimateCost(c.model, inTk, outTk) : c.totalCost;
              return { ...c, messages, totalIn, totalOut, totalCost };
            }),
          },
        },
      };
    }
    case 'UPDATE_IMAGE_MSG': {
      const { tabId, id, imageUrl, revisedPrompt, error } = action.payload;
      const t = state.tabs[tabId];
      if (!t) return state;
      return {
        ...state,
        tabs: {
          ...state.tabs,
          [tabId]: {
            ...t,
            convs: t.convs.map(c => {
              if (c.id !== t.activeId) return c;
              const messages = c.messages.map(m => {
                if (m.id !== id) return m;
                if (error) return { ...m, done:true, content:`⚠️ ${error}`, type:undefined };
                return { ...m, imageUrl, revisedPrompt, done:true };
              });
              return { ...c, messages };
            }),
          },
        },
      };
    }
    case 'EDIT_MESSAGE': {
      const { tabId, msgId } = action.payload;
      const t = state.tabs[tabId];
      return { ...state, tabs: { ...state.tabs, [tabId]: { ...t, convs: t.convs.map(c => {
        if (c.id !== t.activeId) return c;
        const idx = c.messages.findIndex(m => m.id === msgId);
        if (idx === -1) return c;
        return { ...c, messages: c.messages.slice(0, idx) };
      }) } } };
    }
    case 'REGENERATE': {
      const { tabId } = action.payload;
      const t = state.tabs[tabId];
      return { ...state, tabs: { ...state.tabs, [tabId]: { ...t, convs: t.convs.map(c => {
        if (c.id !== t.activeId) return c;
        const messages = [...c.messages];
        if (messages.length && messages[messages.length - 1].role === 'assistant') messages.pop();
        return { ...c, messages };
      }) } } };
    }
    case '_SET_CONV_MESSAGES': {
      const { tabId, convId, messages } = action.payload;
      const t = state.tabs[tabId];
      return { ...state, tabs: { ...state.tabs, [tabId]: { ...t, convs: t.convs.map(c => c.id === convId ? { ...c, messages } : c) } } };
    }
    default: return state;
  }
}

// ─── Context ─────────────────────────────────────────────────
const Ctx = createContext(null);
function useApp() { return useContext(Ctx); }

function AppProvider({ children }) {
  const [state, dispatch] = useReducer(reducer, null, () => {
    const settings = loadSettings();
    const needsGate = !!(settings.appCode && !localStorage.getItem('ricard_device_auth'));
    return {
      profile: null, tab: 'chat', tabs: {},
      settings, monthCost: 0,
      streaming: false,
      showModelPicker: false, showSettings: false, showDashboard: false,
      showPinEntry: false, pendingProfile: null,
      artifact: null, showArtifact: false,
      showSearch: false, showCompare: false,
      showFamilyGate: needsGate,
      toasts: [],
      welcome: null,
    };
  });

  // Keyboard shortcuts
  useEffect(() => {
    const h = (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (!mod) return;
      if (e.key === 'k') { e.preventDefault(); dispatch({ type: 'TOGGLE_MODEL_PICKER' }); }
      if (e.key === 'n') { e.preventDefault(); dispatch({ type: 'NEW_CONV', payload: { tabId: null } }); }
      if (e.key === ',') { e.preventDefault(); dispatch({ type: 'TOGGLE_SETTINGS' }); }
      if (e.key === 'd') { e.preventDefault(); dispatch({ type: 'TOGGLE_DASHBOARD' }); }
      if (e.key === 'f') { e.preventDefault(); dispatch({ type: 'TOGGLE_SEARCH' }); }
      if (e.key === 'Escape') dispatch({ type: 'CLOSE_OVERLAYS' });
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  // Persist convs (localStorage + Firebase)
  useEffect(() => {
    if (!state.profile) return;
    TABS.forEach(t => {
      if (!state.tabs[t]) return;
      saveConvs(state.profile, t, state.tabs[t].convs);
      cloudSaveLater(state.profile, t, state.tabs[t].convs);
    });
  }, [state.profile, state.tabs]);

  // Charger depuis Firebase quand le profil change
  useEffect(() => {
    if (!state.profile) return;
    let cancelled = false;
    cloudLoadAll(state.profile).then(cloudData => {
      if (cancelled || !cloudData) return;
      dispatch({ type: 'MERGE_CLOUD_TABS', payload: cloudData });
    });
    return () => { cancelled = true; };
  }, [state.profile]);

  // Refs pour éviter les boucles de sync clé API
  const apiKeyRef       = useRef(state.settings.apiKey); // clé courante
  const lastPushedKey   = useRef(state.settings.apiKey); // dernière clé envoyée à Firebase
  useEffect(() => { apiKeyRef.current = state.settings.apiKey; }, [state.settings.apiKey]);

  // Persist settings + push clé API vers Firebase si elle change
  useEffect(() => {
    saveSettings(state.settings);
    const key = state.settings.apiKey;
    if (key && key !== lastPushedKey.current) {
      lastPushedKey.current = key;
      cloudSaveApiKey(key);
    }
  }, [state.settings]);

  // 🔑 Écoute Firebase — synchronise la clé API sur tous les appareils famille
  useEffect(() => {
    const unsub = cloudWatchApiKey(remoteKey => {
      if (!remoteKey || remoteKey === apiKeyRef.current) return; // déjà à jour
      const hadKey = !!apiKeyRef.current;
      // Met à jour les refs AVANT dispatch pour stopper la boucle push
      apiKeyRef.current     = remoteKey;
      lastPushedKey.current = remoteKey;
      // Sauvegarde locale
      lsSet('apikey_backup', remoteKey);
      // Applique dans le state React
      dispatch({ type:'SET_SETTINGS', payload:{ ...loadSettings(), apiKey: remoteKey } });
      // Toast seulement si l'appareil n'avait pas de clé (premier setup)
      if (!hadKey) {
        dispatch({ type:'SHOW_TOAST', payload:{
          message: '🔑 Clé API synchronisée depuis le cloud famille !',
          type: 'info', duration: 6000,
        }});
      }
      console.log('[Firebase] 🔑 clé API reçue du cloud');
    });
    return unsub; // cleanup au démontage
  }, []); // mount une seule fois — le snapshot reste actif

  // Toast milestone streak à la connexion
  useEffect(() => {
    if (!state.profile) return;
    const streak = getStreak(state.profile);
    const milestones = [3, 7, 14, 30, 60, 100];
    if (!milestones.includes(streak)) return;
    const toastKey = `streak_toast_${state.profile}_${streak}`;
    if (lsGet(toastKey, false)) return;
    lsSet(toastKey, true);
    const name = getProfile(state.profile)?.name;
    const emojis = { 3:'🌟', 7:'🔥', 14:'💪', 30:'🏆', 60:'👑', 100:'🚀' };
    dispatch({ type:'SHOW_TOAST', payload:{ message:`${emojis[streak] || '🎉'} ${streak} jours de suite pour ${name} ! Incroyable !`, type:'info', duration:5000 }});
  }, [state.profile]);

  // Auto-lock sur inactivité
  useEffect(() => {
    const mins = state.settings.autoLockMinutes;
    if (!state.profile || !mins) return;
    const ms = mins * 60 * 1000;
    let timer = setTimeout(() => dispatch({ type:'SET_PROFILE', payload:null }), ms);
    const reset = () => { clearTimeout(timer); timer = setTimeout(() => dispatch({ type:'SET_PROFILE', payload:null }), ms); };
    const evts = ['mousedown','mousemove','keydown','touchstart','scroll'];
    evts.forEach(ev => window.addEventListener(ev, reset, { passive:true }));
    return () => { clearTimeout(timer); evts.forEach(ev => window.removeEventListener(ev, reset)); };
  }, [state.profile, state.settings.autoLockMinutes]);

  const sendMessage = useCallback(async ({ tabId, content, attachments = [], abortRef }) => {
    const t = tabId || state.tab;
    const hasContent = content?.trim() || attachments.length;
    if (!hasContent || state.streaming) return;

    // ── Kids content filter ──
    const profile = getProfile(state.profile);
    if (profile?.isKid && content?.trim() && !isKidsSafe(content)) {
      const refusal = profile.age <= 9
        ? '🌸 Oups, je préfère qu\'on parle d\'autre chose ! On joue à un jeu ou on raconte une histoire ? 😊'
        : '✨ Ce sujet n\'est pas pour moi ! Tu as des devoirs ou quelque chose de sympa à explorer ? 😊';
      dispatch({ type:'ADD_MSG', payload:{ tabId:t, msg:{ role:'user', content, attachments, id:uuid() } } });
      dispatch({ type:'ADD_MSG', payload:{ tabId:t, msg:{ role:'assistant', content:refusal, id:uuid(), done:true, inTk:0, outTk:0 } } });
      return;
    }

    // ── Daily limits ──
    const pid = state.profile;
    const limit = state.settings.dailyLimits?.[pid];
    if (limit !== null && limit !== undefined) {
      const dkey = 'daily_' + pid + '_' + dateKey();
      const count = lsGet(dkey, 0);
      if (count >= limit) {
        dispatch({ type:'ADD_MSG', payload:{ tabId:t, msg:{ role:'user', content, attachments, id:uuid() } } });
        dispatch({ type:'ADD_MSG', payload:{ tabId:t, msg:{ role:'assistant', content:`⏱️ Limite journalière atteinte (${limit} messages). Reviens demain !`, id:uuid(), done:true, inTk:0, outTk:0 } } });
        return;
      }
      lsSet(dkey, count + 1);
    }

    dispatch({ type:'ADD_MSG', payload:{ tabId:t, msg:{ role:'user', content, attachments, id:uuid() } } });
    dispatch({ type:'ADD_MSG', payload:{ tabId:t, msg:{ role:'assistant', content:'', id:uuid(), done:false } } });
    dispatch({ type:'SET_STREAMING', payload:true });

    const tab = state.tabs[t];
    const conv = tab?.convs.find(c => c.id === tab.activeId);
    if (!conv) { dispatch({ type:'SET_STREAMING', payload:false }); return; }

    let sysPrompt = SYSTEM_PROMPTS[t] || SYSTEM_PROMPTS.chat;
    // ── Socratic mode ──
    if ((t === 'zya' || t === 'zelie') && state.settings.socraticMode?.[t]) {
      sysPrompt += '\n\n[MODE SOCRATIQUE] Au lieu de donner directement les réponses, guide par des questions. Pose une question à la fois pour amener l\'élève à trouver par lui-même. Félicite les bonnes réponses.';
    }
    // ── Profile context ──
    const profileCtx = state.settings.profileContext?.[pid];
    if (profileCtx?.trim()) {
      sysPrompt += '\n\n[CONTEXTE PERSONNEL]\n' + profileCtx.trim();
    }
    const apiMsgs = [
      { role:'system', content: sysPrompt },
      ...conv.messages.filter(m => m.content || m.attachments?.length).map(m => ({ role:m.role, content:buildMsgContent(m) })),
      { role:'user', content: buildMsgContent({ content, attachments }) },
    ];

    const controller = new AbortController();
    if (abortRef) abortRef.current = controller;

    await streamChat({
      apiKey: state.settings.apiKey,
      model: conv.model,
      messages: apiMsgs,
      signal: controller.signal,
      onChunk: (_d, full) => {
        dispatch({ type:'UPDATE_ASSISTANT', payload:{ tabId:t, content:full, inTk:0, outTk:0, done:false } });
      },
      onDone: ({ text, inputTokens, outputTokens }) => {
        dispatch({ type:'UPDATE_ASSISTANT', payload:{ tabId:t, content:text, inTk:inputTokens, outTk:outputTokens, done:true } });
        dispatch({ type:'SET_STREAMING', payload:false });
        const cost = estimateCost(conv.model, inputTokens, outputTokens);
        const newCost = addMonthCost(state.profile, cost);
        dispatch({ type:'SET_MONTH_COST', payload: newCost });
        appendCostLog({ ts:Date.now(), profile:state.profile, tab:t, model:conv.model, inputTokens, outputTokens, cost });
        // ── Alertes budget ──────────────────────────────────
        const pid = state.profile;
        const budget = state.settings.budgets?.[pid] || 50;
        const pct = newCost / budget;
        const warnKey80  = `budget_warn80_${pid}_${monthKey()}`;
        const warnKey100 = `budget_warn100_${pid}_${monthKey()}`;
        const profName = getProfile(pid)?.name || pid;
        // ── Toast level-up rang ─────────────────────────
        const xpNow = getXP(pid);
        const rankNow  = getRank(xpNow);
        const rankPrev = getRank(xpNow - 1);
        if (rankNow.min !== rankPrev.min) {
          dispatch({ type:'SHOW_TOAST', payload:{ message:`🎉 Nouveau rang pour ${profName} : ${rankNow.label} !`, type:'info', duration:6000 }});
        }
        if (pct >= 1.0 && !lsGet(warnKey100, false)) {
          lsSet(warnKey100, true);
          dispatch({ type:'SHOW_TOAST', payload:{ message:`🚨 Budget épuisé pour ${profName} ! (${budget}$)`, type:'error', duration:7000 }});
        } else if (pct >= 0.8 && !lsGet(warnKey80, false)) {
          lsSet(warnKey80, true);
          dispatch({ type:'SHOW_TOAST', payload:{ message:`⚠️ Budget à 80% pour ${profName} (${newCost.toFixed(2)}$/${budget}$)`, type:'warning', duration:5000 }});
        }
      },
      onError: errMsg => {
        dispatch({ type:'UPDATE_ASSISTANT', payload:{ tabId:t, content:`⚠️ ${errMsg}`, inTk:0, outTk:0, done:true } });
        dispatch({ type:'SET_STREAMING', payload:false });
      },
    });
  }, [state.tab, state.tabs, state.streaming, state.settings.apiKey, state.profile]);

  return <Ctx.Provider value={{ state, dispatch, sendMessage }}>{children}</Ctx.Provider>;
}

// ─── Markdown renderer ────────────────────────────────────────
function parseBlocks(text) {
  if (!text) return [];
  const parts = [];
  const re = /```(\w*)\n?([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push({ type:'text', content: text.slice(last, m.index) });
    parts.push({ type:'code', lang: m[1], content: m[2] });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push({ type:'text', content: text.slice(last) });
  return parts;
}

function inlineMd(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code style="background:#f1eee5;padding:1px 4px;border-radius:3px;font-size:.9em">$1</code>')
    .replace(/\n/g, '<br/>');
}

function TextBlock({ text }) {
  const lines = text.split('\n');
  const out = [];
  let listItems = [];
  const flush = () => {
    if (!listItems.length) return;
    out.push(<ul key={out.length} style={{ margin:'6px 0', paddingLeft:20 }}>
      {listItems.map((it, i) => <li key={i} dangerouslySetInnerHTML={{ __html: inlineMd(it) }} style={{ marginBottom:2 }} />)}
    </ul>);
    listItems = [];
  };
  lines.forEach((line, i) => {
    const hm = line.match(/^(#{1,3}) (.+)/);
    if (hm) {
      flush();
      const sz = [20,17,15][hm[1].length - 1];
      out.push(<div key={i} style={{ fontWeight:700, fontSize:sz, marginTop:hm[1].length===1?12:8, marginBottom:4 }}>{hm[2]}</div>);
    } else if (line.match(/^[-•*] /)) {
      listItems.push(line.replace(/^[-•*] /, ''));
    } else if (line.match(/^\d+\. /)) {
      listItems.push(line.replace(/^\d+\. /, ''));
    } else {
      flush();
      if (line.trim()) out.push(<p key={i} style={{ margin:'4px 0' }} dangerouslySetInnerHTML={{ __html: inlineMd(line) }} />);
    }
  });
  flush();
  return <>{out}</>;
}

const DOWNLOADABLE_LANGS = { html:'text/html', svg:'image/svg+xml', css:'text/css', js:'text/javascript', jsx:'text/javascript', ts:'text/typescript', tsx:'text/typescript', json:'application/json', xml:'application/xml' };
const RENDERABLE = ['html','svg'];
const PRISM_LANG = { js:'javascript', jsx:'jsx', ts:'typescript', tsx:'tsx', py:'python', sh:'bash', bash:'bash', zsh:'bash', html:'markup', xml:'markup', svg:'markup', css:'css', json:'json', sql:'sql' };

function CodeBlock({ lang, content, onOpenArtifact }) {
  const [copied, setCopied] = useState(false);
  const codeRef = useRef(null);
  const l = (lang || '').toLowerCase();

  useEffect(() => {
    if (codeRef.current && window.Prism) {
      codeRef.current.textContent = content;
      codeRef.current.className = `language-${PRISM_LANG[l] || l}`;
      window.Prism.highlightElement(codeRef.current);
    }
  }, [content, l]);

  const copy = () => { navigator.clipboard.writeText(content); setCopied(true); setTimeout(() => setCopied(false), 1500); };
  const download = () => {
    const mime = DOWNLOADABLE_LANGS[l] || 'text/plain';
    const blob = new Blob([content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ricard-design.${l || 'txt'}`;
    a.click(); URL.revokeObjectURL(a.href);
  };

  return (
    <div style={{ background:'#1e1e2e', borderRadius:8, overflow:'hidden', margin:'8px 0', border:'1px solid #333' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 12px', background:'#2a2a3e', borderBottom:'1px solid #333' }}>
        <span style={{ fontSize:11, color:'#888', fontFamily:'monospace' }}>{lang || 'code'}</span>
        <div style={{ display:'flex', gap:5 }}>
          {RENDERABLE.includes(l) && onOpenArtifact && (
            <button onClick={() => onOpenArtifact({ lang: l, content })}
              style={{ background:'none', border:'1px solid #5a5a8a', color:'#9b9bff', borderRadius:4, padding:'2px 8px', fontSize:11, cursor:'pointer' }}>
              ↗ Aperçu
            </button>
          )}
          {DOWNLOADABLE_LANGS[l] && (
            <button onClick={download}
              style={{ background:'none', border:'1px solid #444', color:'#6af', borderRadius:4, padding:'2px 8px', fontSize:11, cursor:'pointer' }}>
              ⬇ .{l}
            </button>
          )}
          <button onClick={copy}
            style={{ background:'none', border:'1px solid #444', color: copied ? C.green : '#888', borderRadius:4, padding:'2px 8px', fontSize:11, cursor:'pointer' }}>
            {copied ? '✓' : 'copier'}
          </button>
        </div>
      </div>
      <pre style={{ margin:0, padding:'12px 16px', fontSize:13, overflow:'auto', lineHeight:1.6, background:'transparent' }}>
        <code ref={codeRef} className={`language-${PRISM_LANG[l] || l}`}>{content}</code>
      </pre>
    </div>
  );
}

function MsgContent({ content, onOpenArtifact }) {
  const parts = parseBlocks(content);
  if (!parts.length) return <span style={{ opacity:.4, fontStyle:'italic' }}>…</span>;
  return <div>{parts.map((p, i) => p.type === 'code'
    ? <CodeBlock key={i} lang={p.lang} content={p.content} onOpenArtifact={onOpenArtifact} />
    : <TextBlock key={i} text={p.content} />)}</div>;
}

              <div style={{ width:'100%' }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:C.muted, marginBottom:3 }}>

    </div>
  );

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000) return 'maintenant';
  if (d < 3600000) return `${Math.floor(d/60000)}min`;
  if (d < 86400000) return `${Math.floor(d/3600000)}h`;
  return `${Math.floor(d/86400000)}j`;
}

function ChatHeader({ tabId, title, icon, accentColor }) {
  const { state, dispatch, sendMessage } = useApp();
  const isMobile = useIsMobile();
  const t = state.tabs[tabId];
  const conv = t?.convs.find(c => c.id === t.activeId);
  const model = getModel(conv?.model);
  const totalTk = (conv?.totalIn || 0) + (conv?.totalOut || 0);
  const msgs = conv?.messages || [];

  const handleSummarize = async () => {
    if (state.streaming || msgs.length <= 12) return;
    const toSummarize = msgs.slice(0, msgs.length - 3);
    const keep = msgs.slice(msgs.length - 3);
    const apiMsgs = [
      { role:'system', content: 'Résume cette conversation en 3-4 phrases concises en français.' },
      ...toSummarize.filter(m => m.content).map(m => ({ role: m.role, content: m.content })),
    ];
    dispatch({ type:'SET_STREAMING', payload:true });
    let summary = '';
    await streamChat({
      apiKey: state.settings.apiKey,
      model: conv.model,
      messages: apiMsgs,
      onChunk: (_d, full) => { summary = full; },
      onDone: ({ text }) => {
        summary = text;
        // Replace messages: summary bubble + keep last 3
        const summaryMsg = { role:'assistant', content:'📋 RÉSUMÉ: ' + summary, isSummary:true, done:true, id:uuid(), inTk:0, outTk:0 };
        const newMsgs = [summaryMsg, ...keep];
        // Dispatch via a synthetic approach: update active conv messages
        dispatch({ type:'_SET_CONV_MESSAGES', payload:{ tabId, convId: conv.id, messages: newMsgs } });
        dispatch({ type:'SET_STREAMING', payload:false });
      },
      onError: () => { dispatch({ type:'SET_STREAMING', payload:false }); },
    });
  };

  return (
    <div style={{ padding: isMobile ? '8px 12px' : '10px 20px', paddingTop: isMobile ? 'max(8px, env(safe-area-inset-top, 8px))' : '10px', borderBottom:`3px solid ${C.ink}`, background:C.paper, display:'flex', alignItems:'center', justifyContent:'space-between', gap:8, minHeight: isMobile ? 'calc(52px + env(safe-area-inset-top, 0px))' : '52px', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0, flex:1 }}>
        {isMobile && (
          <button onClick={() => dispatch({ type:'SET_PROFILE', payload:null })}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:22, padding:'0 4px', flexShrink:0, color:C.muted, minHeight:44, minWidth:44, display:'flex', alignItems:'center', justifyContent:'center' }}>☰</button>
        )}
        {icon && <span style={{ fontSize:18, flexShrink:0 }}>{icon}</span>}
        <span style={{ fontFamily:'var(--pc-font-display)', fontSize: isMobile ? 16 : 20, color: accentColor || C.ink, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth: isMobile ? 150 : 300 }}>
          {conv?.title !== 'Nouvelle conversation' ? conv?.title : title}
        </span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:6, flexShrink:0 }}>
        {(totalTk > 0 || state.streaming) && !isMobile && (
          <div style={{ display:'flex', alignItems:'center', gap:6, background:'#f7f4ec', border:`1px solid #e8e5dc`, borderRadius:20, padding:'4px 12px', fontSize:13 }}>
            {state.streaming && <span className="streaming-dot" />}
            <span style={{ color:C.muted }}>{(totalTk/1000).toFixed(1)}k tk</span>
            <span style={{ color:'#bbb' }}>·</span>
            <span style={{ fontWeight:600, color:'#555' }}>${(conv?.totalCost || 0).toFixed(4)}</span>
          </div>
        )}
        {state.streaming && isMobile && <span className="streaming-dot" />}
        {msgs.length > 12 && !isMobile && !state.streaming && (
          <button onClick={handleSummarize} title="Condenser la conversation"
            style={{ background:'#f7f4ec', border:`1px solid #e8e5dc`, borderRadius:20, padding:'4px 12px', fontSize:13, cursor:'pointer', color:'#555' }}>
            🗜 Condenser
          </button>
        )}
        {!isMobile && (() => {
          const prof = getProfile(state.profile);
          return (
            <button onClick={() => dispatch({ type:'SET_PROFILE', payload:null })}
              title="Changer de profil"
              style={{ background:'white', border:`2px solid ${C.ink}`, borderRadius:20, padding:'3px 10px', fontSize:11, cursor:'pointer', color:C.ink, display:'flex', alignItems:'center', gap:5, boxShadow:`2px 2px 0 ${C.ink}`, transition:'all 0.1s steps(2)' }}
              onMouseEnter={e => { e.currentTarget.style.background=C.yellow; e.currentTarget.style.transform='translate(-1px,-1px)'; e.currentTarget.style.boxShadow=`3px 3px 0 ${C.ink}`; }}
              onMouseLeave={e => { e.currentTarget.style.background='white'; e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=`2px 2px 0 ${C.ink}`; }}>
              <span style={{ width:16, height:16, borderRadius:'50%', background:prof?.color, border:`1.5px solid ${C.ink}`, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:9, fontFamily:"'Permanent Marker',cursive", fontWeight:700, flexShrink:0 }}>{prof?.label}</span>
              {prof?.name}
            </button>
          );
        })()}
        <button onClick={() => dispatch({ type:'TOGGLE_COMPARE' })} title="Comparer deux modèles"
          style={{ background:'#f7f4ec', border:`1px solid #e8e5dc`, borderRadius:20, padding: isMobile ? '4px 10px' : '3px 10px', fontSize: isMobile ? 16 : 11, cursor:'pointer', color:'#555', display:'flex', alignItems:'center', gap: isMobile ? 0 : 3, minHeight: isMobile ? 36 : 'auto' }}>
          ⚡{!isMobile && ' Comparer'}
        </button>
        {model && (
          <button onClick={() => dispatch({ type:'TOGGLE_MODEL_PICKER' })}
            style={{ background:'#f7f4ec', border:`1px solid #e8e5dc`, borderRadius:20, padding:'4px 12px', fontSize:13, cursor:'pointer', color:'#555', display:'flex', alignItems:'center', gap:4, maxWidth: isMobile ? 130 : 'none', overflow:'hidden' }}>
            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{isMobile ? model.name.split(' ').slice(-1)[0] : model.name}</span>
            <span style={{ color:'#aaa', fontSize:10, flexShrink:0 }}>▾</span>
          </button>
        )}
        <button onClick={() => dispatch({ type:'NEW_CONV', payload:{ tabId } })}
          style={{ background:C.yellow, border:`3px solid ${C.ink}`, borderRadius:'50%', width:32, height:32, cursor:'pointer', color:C.ink, fontSize:18, display:'flex', alignItems:'center', justifyContent:'center', padding:0, flexShrink:0, boxShadow:`2px 2px 0 ${C.ink}`, fontWeight:700 }} title="Nouvelle conversation">+</button>
        {isMobile && (
          <button onClick={() => dispatch({ type:'TOGGLE_SETTINGS' })}
            style={{ background:'none', border:'none', cursor:'pointer', fontSize:22, padding:'0 4px', color:C.muted, minHeight:44, minWidth:44, display:'flex', alignItems:'center', justifyContent:'center' }}>⚙️</button>
        )}
      </div>
    </div>
  );
}

// ─── Image Model Picker Modal ─────────────────────────────────
function ImageModelPickerModal({ current, onSelect, onClose }) {
  const [tab, setTab]       = useState('featured');   // 'featured' | 'catalog'
  const [search, setSearch] = useState('');
  const [liveModels, setLiveModels] = useState(() => Array.isArray(_liveModelsCache) ? _liveModelsCache : null);
  const [loading, setLoading]       = useState(false);
  const [customId, setCustomId]     = useState('');
  const isMobile = useIsMobile();
  const searchRef = useRef(null);

  // Focus auto
  useEffect(() => { setTimeout(() => searchRef.current?.focus(), 80); }, []);
  // Escape key
  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  // Fetch catalogue si pas encore chargé
  useEffect(() => {
    if (tab === 'catalog' && !liveModels && !loading) {
      setLoading(true);
      fetchAllModels().then(m => { if (m) setLiveModels(m); setLoading(false); });
    }
  }, [tab]);

  // ── Onglet Recommandés ──
  const featuredFiltered = IMAGE_MODELS.filter(m => {
    if (!search) return true;
    const q = search.toLowerCase();
    return m.name.toLowerCase().includes(q) || m.by.toLowerCase().includes(q) || m.id.toLowerCase().includes(q);
  });

  // ── Onglet Catalogue ──
  const catalogFiltered = (liveModels || []).filter(m => {
    // Garde les modèles image-gen détectés + ceux qui matchent des mots-clés connus
    const isImgModel = m.imageGen ||
      /dall|flux|stable.?diff|sdxl|midjourney|imagen|firefly|kandinsky|playground|leonardo|wuerstchen/i.test(m.id);
    if (!isImgModel) return false;
    if (!search) return true;
    const q = search.toLowerCase();
    return m.name.toLowerCase().includes(q) || (m.provider||'').toLowerCase().includes(q) || m.id.toLowerCase().includes(q);
  }).sort((a, b) => (a.inCost ?? 0) - (b.inCost ?? 0));

  const TabBtn = ({ id, label, count }) => (
    <button onClick={() => setTab(id)}

      {label}{count != null ? <span style={{ marginLeft:5, fontSize:11, color:'#aaa' }}>({count})</span> : null}
    </button>
  );

    const isActive = (current || 'openai/dall-e-3') === m.id;
    return (
      <button onClick={() => { onSelect(m.id); onClose(); }}
        style={{ width:'100%', textAlign:'left', padding:'10px 14px', border:'none', borderBottom:`1px solid #e8e5dc`, background: isActive ? '#f3e8ff' : 'white', cursor:'pointer', display:'flex', alignItems:'center', gap:10, transition:'background .1s' }}

        onMouseLeave={e => { if (!isActive) e.currentTarget.style.background='white'; }}>
        {/* Indicateur actif */}
        <span style={{ fontSize:14, flexShrink:0, opacity: isActive ? 1 : 0 }}>✓</span>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:14, fontWeight:600, color:C.ink, display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
              {isFeatured ? m.name : (m.name || m.id)}
            </span>
            {isActive && <span style={{ fontSize:10, background:'#7c3aed', color:'white', borderRadius:4, padding:'1px 5px', flexShrink:0 }}>actif</span>}

            {isFeatured ? `${m.by} · ${m.size}` : `${m.provider || m.id.split('/')[0]}`}
